name: Images

# Build de imágenes Docker POR SERVICIO, optimizado:
#  - detect: calcula SOLO los servicios afectados por el diff (cambio de un servicio → 1 build;
#    cambio compartido en packages/lock/patches → todos). Matrix dinámica.
#  - image: en PR es gate (build sin push); en push a main publica a GHCR (único registro canónico, para el
#    VPS). Cache de capas gha por servicio. (El camino ECR/AWS se eliminó — el deploy es VPS, ADR-007 reemplazado.)
#  - deploy: en push a main, hace pull+up del compose en el VPS por SSH (dormido hasta VPS_DEPLOY_ENABLED).
on:
  pull_request:
    branches: [main, develop]
    paths:
      - "services/**"
      - "packages/**"
      - "patches/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".dockerignore"
      - ".github/workflows/images.yml"
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # GHCR push con GITHUB_TOKEN

jobs:
  # ── 1) Detecta SOLO los servicios afectados por el diff ──────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has: ${{ steps.set.outputs.has }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historia para el diff
      - id: set
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          # Catálogo de servicios (service · context · dockerfile · dir-que-lo-afecta)
          ALL='[
            {"service":"audit-service","context":".","dockerfile":"services/audit-service/Dockerfile","dir":"services/audit-service/"},
            {"service":"admin-bff","context":".","dockerfile":"services/bff/admin-bff/Dockerfile","dir":"services/bff/admin-bff/"},
            {"service":"driver-bff","context":".","dockerfile":"services/bff/driver-bff/Dockerfile","dir":"services/bff/driver-bff/"},
            {"service":"public-bff","context":".","dockerfile":"services/bff/public-bff/Dockerfile","dir":"services/bff/public-bff/"},
            {"service":"booking-service","context":".","dockerfile":"services/booking-service/Dockerfile","dir":"services/booking-service/"},
            {"service":"chat-service","context":".","dockerfile":"services/chat-service/Dockerfile","dir":"services/chat-service/"},
            {"service":"dispatch-service","context":".","dockerfile":"services/dispatch-service/Dockerfile","dir":"services/dispatch-service/"},
            {"service":"fleet-service","context":".","dockerfile":"services/fleet-service/Dockerfile","dir":"services/fleet-service/"},
            {"service":"identity-service","context":".","dockerfile":"services/identity-service/Dockerfile","dir":"services/identity-service/"},
            {"service":"media-service","context":".","dockerfile":"services/media-service/Dockerfile","dir":"services/media-service/"},
            {"service":"notification-service","context":".","dockerfile":"services/notification-service/Dockerfile","dir":"services/notification-service/"},
            {"service":"panic-service","context":".","dockerfile":"services/panic-service/Dockerfile","dir":"services/panic-service/"},
            {"service":"payment-service","context":".","dockerfile":"services/payment-service/Dockerfile","dir":"services/payment-service/"},
            {"service":"places-service","context":".","dockerfile":"services/places-service/Dockerfile","dir":"services/places-service/"},
            {"service":"rating-service","context":".","dockerfile":"services/rating-service/Dockerfile","dir":"services/rating-service/"},
            {"service":"share-service","context":".","dockerfile":"services/share-service/Dockerfile","dir":"services/share-service/"},
            {"service":"trip-service","context":".","dockerfile":"services/trip-service/Dockerfile","dir":"services/trip-service/"},
            {"service":"tracking-service","context":"services/tracking-service","dockerfile":"services/tracking-service/Dockerfile","dir":"services/tracking-service/"},
            {"service":"biometric-service","context":"services/biometric-service","dockerfile":"services/biometric-service/Dockerfile","dir":"services/biometric-service/"}
          ]'
          # Base del diff
          if [ "$EVENT" = "pull_request" ]; then
            BASE="origin/$BASE_REF"
          elif [ -n "${BEFORE:-}" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            BASE="$BEFORE"
          else
            BASE="HEAD~1"
          fi
          CHANGED="$(git diff --name-only "$BASE" HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)"
          echo "Cambios:"; echo "$CHANGED" | sed 's/^/  /'
          # Cambio COMPARTIDO → buildear TODO
          if echo "$CHANGED" | grep -qE '^(packages/|patches/|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.dockerignore|\.github/workflows/images\.yml)'; then
            echo "→ cambio compartido: buildeo TODOS"
            MATRIX="$ALL"
          else
            CHJSON="$(printf '%s\n' "$CHANGED" | jq -R . | jq -s .)"
            MATRIX="$(echo "$ALL" | jq -c --argjson ch "$CHJSON" '[ .[] | select(.dir as $d | any($ch[]; startswith($d))) ]')"
          fi
          COUNT="$(echo "$MATRIX" | jq 'length')"
          echo "→ servicios a buildear: $COUNT"
          echo "matrix={\"include\":$(echo "$MATRIX" | jq -c .)}" >> "$GITHUB_OUTPUT"
          echo "has=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  # ── 2) Build (+push en main) solo de los afectados ───────────────────────────────────────
  image:
    needs: detect
    if: needs.detect.outputs.has == 'true'
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # GHCR (siempre, para el VPS) — solo en push (en PR es build-only gate)
      - name: Login GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags
        id: meta
        run: |
          OWNER="${{ github.repository_owner }}"; OWNER="${OWNER,,}"
          GHCR="ghcr.io/${OWNER}/veo/${{ matrix.service }}"
          TAGS="${GHCR}:${{ github.sha }},${GHCR}:latest"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build${{ github.event_name == 'push' && ' & Push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 3) Deploy al VPS (pull + up del compose por SSH) ─────────────────────────────────────
  # Dormido hasta que actives vars.VPS_DEPLOY_ENABLED=true y cargues los secrets VPS_HOST/USER/SSH_KEY.
  deploy:
    needs: [detect, image]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && needs.detect.outputs.has == 'true' && vars.VPS_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Pull + up en el VPS (solo lo que cambió ya está en GHCR)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/veo
            docker compose -f docker-compose.preview.yml pull
            # Infra primero (postgres debe estar arriba para migrar), luego migraciones, luego servicios.
            docker compose -f docker-compose.preview.yml up -d postgres redis kafka clickhouse minio
            # Migra TODAS las DBs (idempotente) ANTES de levantar los servicios → sin drift de schema.
            bash infra/deploy/migrate-preview.sh
            docker compose -f docker-compose.preview.yml up -d --remove-orphans
            docker image prune -f
