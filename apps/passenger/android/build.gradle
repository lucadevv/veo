buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "28.2.13676358"
        kotlinVersion = "2.1.20"
        // @rnmapbox/maps@10.2.1 → Mapbox Maps SDK Android línea 10.16.* (Lote 4). Mantener alineado
        // al actualizar @rnmapbox/maps. (En Android NO hace falta token de descarga: Mapbox levantó
        // el requisito de auth en el repo de releases, por eso no se configura MAPBOX_DOWNLOADS_TOKEN.)
        RNMapboxMapsVersion = '11.20.1'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        // Firebase: plugin de Google Services (lo aplica app/build.gradle si hay credenciales).
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// react-native-background-geolocation distribuye su AAR (tslocationmanager) en un
// repositorio maven local dentro del paquete. Debe declararse aquí para que Gradle
// lo resuelva (de lo contrario busca en remoto y falla con "version 3.+ no encontrada").
allprojects {
    repositories {
        maven {
            url("${rootProject.projectDir}/../../../node_modules/react-native-background-geolocation/android/libs")
        }
        // react-native-background-fetch distribuye su AAR (tsbackgroundfetch) en su
        // propio maven local; necesario porque es peer de background-geolocation.
        maven {
            url("${rootProject.projectDir}/../../../node_modules/react-native-background-fetch/android/libs")
        }
        maven { url 'https://developer.huawei.com/repo/' }

        // @rnmapbox/maps (Lote 4): repo Maven oficial de Mapbox para el Maps SDK Android.
        // Mapbox eliminó el requisito de autenticación en el repo de releases, así que NO se
        // necesita credentials { username/password } ni MAPBOX_DOWNLOADS_TOKEN (a diferencia de iOS).
        maven { url 'https://api.mapbox.com/downloads/v2/releases/maven' }
    }
}
