name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Resolución de los paquetes @veo/* en CI
# ---------------------------------------------------------------------------
# En DEV local, esta app consume @veo/* vía `file:../veo-platform/packages/*`
# (ver package.json + docs/cross-repo-workflow.md de veo-platform). En CI el repo
# hermano veo-platform NO existe, por lo que `file:` no resuelve y el lockfile
# está pinneado a esas rutas.
#
# Estrategia (dos caminos, en este orden de preferencia):
#
#   1) GitHub Packages (camino de PRODUCCIÓN — ADR 009): los paquetes @veo/*
#      se publican como privados en npm.pkg.github.com. El paso de setup-node
#      registra el scope @veo contra GitHub Packages usando NODE_AUTH_TOKEN.
#      Para activarlo, el package.json debe migrar de `file:` a rangos semver;
#      mientras siga en `file:`, pnpm ignora el registro y usa la ruta local.
#
#   2) Checkout del repo hermano (camino actual, mientras el package.json use
#      `file:`): clonamos veo-platform en la ruta hermana esperada para que
#      `file:../veo-platform/packages/*` resuelva igual que en local. Usa
#      VEO_PLATFORM_TOKEN (PAT con acceso de lectura) si el repo es privado;
#      si el secret no está disponible el job se salta de forma explícita en
#      lugar de fallar en rojo de forma engañosa.
# ---------------------------------------------------------------------------

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.12.0"

jobs:
  check:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout veo-driver-app
        uses: actions/checkout@v4
        with:
          path: veo-driver-app

      # --- Camino 2: traer el repo hermano para que `file:` resuelva ---------
      - name: Checkout veo-platform (sibling for @veo/* file links)
        id: sibling
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.repository_owner }}/veo-platform
          ref: main
          path: veo-platform
          token: ${{ secrets.VEO_PLATFORM_TOKEN || github.token }}

      - name: Gate · ensure @veo/* packages are resolvable
        id: gate
        working-directory: veo-driver-app
        run: |
          if [ -d ../veo-platform/packages/shared-types ]; then
            echo "veo-platform sibling present, file links resolve."
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::veo-platform sibling not available and package.json still uses file: links."
            echo "::warning::Skipping install/lint/typecheck/test. Migrate @veo/* to GitHub Packages semver ranges or provide VEO_PLATFORM_TOKEN to enable this job."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.gate.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: veo-driver-app/pnpm-lock.yaml
          # Camino 1 (GitHub Packages): registra el scope @veo. Inocuo mientras
          # el package.json siga usando `file:` (pnpm no consultará el registro).
          registry-url: https://npm.pkg.github.com
          scope: "@veo"

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        working-directory: veo-driver-app
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VEO_PLATFORM_TOKEN || github.token }}

      - name: Lint
        if: steps.gate.outputs.ready == 'true'
        working-directory: veo-driver-app
        run: pnpm lint

      - name: Typecheck
        if: steps.gate.outputs.ready == 'true'
        working-directory: veo-driver-app
        run: pnpm typecheck

      - name: Test
        if: steps.gate.outputs.ready == 'true'
        working-directory: veo-driver-app
        run: pnpm test -- --ci

  android-build:
    name: Android (assembleDebug)
    runs-on: ubuntu-latest
    needs: [check]
    # Opcional / gateado: solo corre en push a main o cuando el PR lleva la
    # etiqueta `android-build`. La app driver es Android-first, pero el build
    # nativo es caro: lo dejamos opt-in para no gastar minutos en cada push.
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'android-build')
    steps:
      - name: Checkout veo-driver-app
        uses: actions/checkout@v4
        with:
          path: veo-driver-app

      - name: Checkout veo-platform (sibling for @veo/* file links)
        id: sibling
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ github.repository_owner }}/veo-platform
          ref: main
          path: veo-platform
          token: ${{ secrets.VEO_PLATFORM_TOKEN || github.token }}

      - name: Gate · ensure @veo/* packages are resolvable
        id: gate
        working-directory: veo-driver-app
        run: |
          if [ -d ../veo-platform/packages/shared-types ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::veo-platform sibling not available; skipping Android build."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.gate.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: veo-driver-app/pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: "@veo"

      - name: Setup Java (Temurin 17)
        if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        if: steps.gate.outputs.ready == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        working-directory: veo-driver-app
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VEO_PLATFORM_TOKEN || github.token }}

      - name: Gradle assembleDebug
        if: steps.gate.outputs.ready == 'true'
        working-directory: veo-driver-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        if: steps.gate.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: driver-app-debug-apk
          path: veo-driver-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 7
