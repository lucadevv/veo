syntax = "proto3";

package veo.identity.v1;

// Contrato gRPC que identity-service expone a otros servicios (trip, dispatch, panic, etc.).
// mTLS en producciГіn (FOUNDATION В§10). Kafka cubre lo asГӯncrono; gRPC lo sГӯncrono de lectura.
service IdentityService {
  rpc GetUser (GetByIdRequest) returns (UserReply);
  rpc GetDriver (GetByIdRequest) returns (DriverReply);
  rpc GetDriverByUser (GetByIdRequest) returns (DriverReply);
  // Lectura BATCH para enriquecer listados del admin (nombre/telГ©fono por pГЎgina, sin N+1). El admin-bff
  // la llama UNA vez por pГЎgina con los driverId visibles; devuelve los DriverReply hallados (orden libre).
  rpc GetDriversByIds (DriverIdsRequest) returns (DriversByIdsReply);
  // Lectura BATCH de USERS por User.id, para resolver el NOMBRE del conductor en listados del admin donde solo
  // se tiene el User.id (ej. la lista de vehГӯculos: Vehicle.driver_id = User.id). Espejo de GetDriversByIds.
  rpc GetUsersByIds (UserIdsRequest) returns (UsersByIdsReply);
  // Conteo de conductores por estado de antecedentes (backgroundCheckStatus), para los stat cards del panel
  // admin (embudo de aprobaciГіn). Agregado con groupBy en la rГ©plica de lectura; sin PII, solo enteros.
  rpc GetDriverCounts (DriverCountsRequest) returns (DriverCountsReply);
}

message GetByIdRequest {
  string id = 1;
}

message DriverIdsRequest {
  repeated string ids = 1;
}

message DriversByIdsReply {
  repeated DriverReply drivers = 1;
}

message UserIdsRequest {
  repeated string ids = 1;
}

message UsersByIdsReply {
  repeated UserReply users = 1;
}

// Request vacГӯo del conteo global de conductores (sin filtros; el scoping lo da el riel ADMIN del gRPC).
message DriverCountsRequest {}

// Conteo de conductores por backgroundCheckStatus. proto3 default 0 cuando no hay filas de ese estado.
message DriverCountsReply {
  int32 pending = 1;
  int32 cleared = 2;
  int32 rejected = 3;
  // Conductores EN LГҚNEA (presencia operativa: current_status NO OFFLINE ni SUSPENDED) вҶ’ KPI "En lГӯnea".
  int32 online = 4;
}

message UserReply {
  string id = 1;
  string phone = 2;
  string type = 3;
  string kyc_status = 4;
  bool deleted = 5;
  bool found = 6;
  // Nombre visible del usuario. Opcional ("" si no fue registrado). AГұadido sin romper compatibilidad.
  string name = 7;
  // Foto de perfil (avatar) del usuario В· publicUrl del media-service. "" si no tiene. AГұadido sin romper
  // compatibilidad (el conductor lee su avatar por GetUser en el driver-bff getMe, espejo del pasajero).
  string photo_url = 8;
}

message DriverReply {
  string id = 1;
  string user_id = 2;
  string current_status = 3;
  string background_check_status = 4;
  double average_rating = 5;
  bool found = 6;
  // ISO-8601 del momento de suspensiГіn del conductor; "" si NO estГЎ suspendido. AГұadido sin romper
  // compatibilidad (campo 7). Lo consume dispatch para el gate de elegibilidad de la PUJA (ADR 010 В§6,
  // cierre estructural del catastrГіfico #9): un conductor suspendido no puede ofertar.
  string suspended_at = 7;
  // BE-1b В· nombre visible del conductor (de User.name vГӯa la relaciГіn driverвҶ’user). "" si no registrado.
  // Lo consume el public-bff para enriquecer la card de la oferta de la puja con el nombre del conductor.
  string name = 8;
  // Motivo del Гәltimo rechazo de antecedentes del conductor; "" si NO estГЎ rechazado o no se dio motivo.
  // AГұadido sin romper compatibilidad (campo 9). Lo consume el driver-bff (GET /drivers/me) para que la
  // app del conductor muestre el motivo en la pantalla de RECHAZO y ofrezca corregir-y-reenviar.
  string rejection_reason = 9;
  // в”Җв”Җ Campos de REVISIГ“N del operador (admin-bff GET /ops/drivers/:id). AГұadidos sin romper
  // compatibilidad (campos 10-15). Todos opcionales: "" / proto3-default cuando no hay dato. в”Җв”Җ
  // Licencia/DNI del conductor (IDENTIDAD personal В· Compliance+); "" si no registrada.
  string license_number = 10;
  // Estado KYC del usuario asociado (driverвҶ’user). "" si no se incluyГі / no registrado.
  string kyc_status = 11;
  // ISO-8601 de alta del conductor; "" si no disponible.
  string created_at = 12;
  // ISO-8601 del enrolamiento biomГ©trico facial; "" si aГәn no enrolГі.
  string face_enrolled_at = 13;
  // ISO-8601 de la Гәltima verificaciГіn biomГ©trica en vivo; "" si nunca verificГі.
  string last_verified_at = 14;
  // TelГ©fono del usuario asociado (driverвҶ’user); "" si no registrado.
  string phone = 15;
  // DNI del conductor (documento de identidad В· Compliance+); "" si no registrado. Backward-compatible.
  string document_id = 16;
  // Fecha de nacimiento del conductor en yyyy-mm-dd; "" si no registrada. Backward-compatible.
  string birth_date = 17;
  // в”Җв”Җ Sub-lote 3C В· BINDING DNIвҶ”selfie (admin-bff GET /ops/drivers/:id). Resultado GUARDADO del face-match
  // entre la foto FRONT del DNI y la biometrГӯa de referencia del conductor. El operador lo VE antes de
  // aprobar. Campos 18-20. Backward-compatible (proto3 defaults: "" / 0 / false cuando no se corriГі). в”Җв”Җ
  // Estado del binding tipado: NOT_RUN (aГәn no se corriГі), MATCHED (coincide), NO_MATCH (no coincide). Evita
  // ambigГјedad del bool proto3 (false = no coincide vs no corrido): usamos un string de estado explГӯcito.
  string dni_face_match_status = 18;
  // Score del face-match en 0..100; 0 si no se corriГі. Solo significativo si dni_face_match_status != NOT_RUN.
  double dni_face_match_score = 19;
  // ISO-8601 de cuГЎndo se corriГі el face-match; "" si no se corriГі.
  string dni_face_matched_at = 20;
  // CAUSAS ACTIVAS de la suspensiГіn (modelo de HOLDS): el conjunto de `cause` DISTINTAS de los holds vigentes
  // del conductor (DISCIPLINARY / DOCUMENT_EXPIRED / INSPECTION_EXPIRED). VacГӯo si NO estГЎ suspendido. Campo
  // 21, backward-compatible. Lo consume el admin-bff (GET /ops/drivers/:id) para que el panel sepa POR QUГү
  // estГЎ suspendido y llame el endpoint correcto de reactivaciГіn: DISCIPLINARY вҶ’ /reactivate;
  // DOCUMENT_EXPIRED/INSPECTION_EXPIRED вҶ’ /reactivate-compliance. NO es PII. `suspended_at` (campo 7) sigue
  // siendo el flag derivado de "estГЎ suspendido"; esto aГұade el PORQUГү. Un conductor puede tener VARIAS causas.
  repeated string suspension_causes = 21;
  // в”Җв”Җ Lote C В· BINDING licenciaвҶ”selfie (gemelo del DNI, binding MГҒS FUERTE). Resultado GUARDADO del face-match
  // entre la foto del brevete (LICENSE_A1) y la biometrГӯa de referencia. El operador lo VE antes de aprobar;
  // approve() exige AMBOS bindings ejecutados. Campos 22-24, backward-compatible (proto3 defaults). в”Җв”Җ
  string license_face_match_status = 22;
  // Score del face-match del brevete en 0..100; 0 si no se corriГі. El brevete es low-res вҶ’ score tГӯpicamente
  // mГЎs bajo que el DNI; el veredicto lo decide el operador. Solo significativo si status != NOT_RUN.
  double license_face_match_score = 23;
  // ISO-8601 de cuГЎndo se corriГі el face-match del brevete; "" si no se corriГі.
  string license_face_matched_at = 24;
  // F5 В· key S3/MinIO de la SELFIE del enrol (ayuda visual del operador). ADMIN-ONLY (PII В· Ley 29733): solo
  // viaja por el riel admin; "" en rieles no-admin o si no hay selfie. Campo 25, backward-compatible.
  string face_selfie_key = 25;
  // в”Җв”Җ LIVENESS PASIVO (anti-spoofing PAD del enrol). El operador lo VE antes de aprobar; approve() exige que el
  // PAD haya CORRIDO. Status DERIVADO (NOT_RUN/PASSED/DEGRADED): NOT_RUN = sin enrol; PASSED = PAD corriГі y dio
  // viva; DEGRADED = enrolГі sin PAD (modelo ausente). ADMIN-ONLY; "" / 0 en rieles no-admin. Campos 26-27. в”Җв”Җ
  string liveness_status = 26;
  // Score de la clase viva del PAD en 0..1 (NO 0..100 como los face-match); 0 si no se corriГі. Solo
  // significativo si status == PASSED o DEGRADED.
  double liveness_score = 27;
}
