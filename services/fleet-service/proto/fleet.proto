syntax = "proto3";

package veo.fleet.v1;

// Contrato gRPC que fleet-service expone a otros servicios (identity/admin).
// mTLS en producción (FOUNDATION §10). Kafka cubre lo asíncrono; gRPC lo síncrono de lectura.
service FleetService {
  rpc GetVehicle (GetByIdRequest) returns (VehicleReply);
  // Lee VARIOS vehículos por id en UNA llamada (anti-N+1). Lo usa la BÚSQUEDA de carpooling (booking) para
  // filtrar las ofertas cuyo vehículo dejó de ser operable (docs SOAT/ITV vencidos) sin N llamadas GetVehicle.
  // El reply trae un VehicleReply por cada id ENCONTRADO (found=true); los ids inexistentes se omiten.
  rpc GetVehiclesByIds (GetByIdsRequest) returns (VehiclesReply);
  rpc GetDriverVehicles (GetByIdRequest) returns (DriverVehiclesReply);
  // Vehículo OPERADO del conductor (selector AUTORITATIVO único: pickActiveVehicle — selectedAt más
  // reciente con docs vigentes). `id` = User.id (Vehicle.driver_id). found=false si no tiene ninguno
  // operable. Dispatch lo usa al adjudicar una oferta para que el vehicleId del viaje sea EL MISMO que
  // el resto del sistema considera operado (no un .find(active) divergente).
  rpc GetDriverActiveVehicle (GetByIdRequest) returns (VehicleReply);
  rpc GetDriverDocuments (GetByIdRequest) returns (DriverDocumentsReply);
  // Vigencia de la inspección técnica (ITV) del vehículo OPERADO del conductor. `id` = User.id (NO el
  // driverId de perfil): los vehículos se indexan por Vehicle.driver_id = User.id. Gate de aprobación.
  rpc GetDriverInspectionStatus (GetByIdRequest) returns (DriverInspectionStatusReply);
  // Conteo de vehículos por estado documental (docStatus), para los stat cards del panel admin (embudo de
  // vigencia documental de la flota). Agregado con groupBy en la réplica de lectura; sin PII, solo enteros.
  rpc GetVehicleCounts (GetVehicleCountsRequest) returns (VehicleCountsReply);
  // Conteo de las COLAS DE REVISIÓN de flota (docs por revisar, docs por vencer, modelos por curar), para la
  // cola unificada de Revisiones del panel admin. Cuentas agregadas en la réplica de lectura; sin PII.
  rpc GetReviewQueueCounts (GetReviewQueueCountsRequest) returns (ReviewQueueCountsReply);
  // Completitud documental de VARIOS conductores en UNA llamada (anti-N+1), para la columna "Documentos X/Y"
  // + el embudo (sin docs / listos) del panel. `ids` = Driver.id (los docs DRIVER-scoped se indexan por
  // ownerId=Driver.id). Devuelve, por cada id, cuántos REQUERIDOS están en estado VALID sobre el total. Sin PII.
  rpc GetDriverDocsCompleteness (GetByIdsRequest) returns (DriverDocsCompletenessReply);
}

message GetByIdRequest {
  string id = 1;
}

// Request vacío del conteo global de vehículos (sin filtros; el scoping lo da el gate de identidad interna).
message GetVehicleCountsRequest {}

// Conteo de vehículos por docStatus (VALID/EXPIRING_SOON/EXPIRED). proto3 default 0 si no hay filas del estado.
message VehicleCountsReply {
  int32 valid = 1;
  int32 expiring_soon = 2;
  int32 expired = 3;
}

// Completitud documental de un conductor: cuántos docs REQUERIDOS están en estado VALID sobre el total.
message DriverDocsCompleteness {
  string driver_id = 1;
  int32 valid_required = 2;
  int32 required_total = 3;
}

// Reply batch de GetDriverDocsCompleteness. Un item por cada id pedido (orden libre; el consumidor mapea por id).
message DriverDocsCompletenessReply {
  repeated DriverDocsCompleteness items = 1;
}

// Request vacío del conteo de las colas de revisión de flota.
message GetReviewQueueCountsRequest {}

// Conteo de las colas de revisión de flota: documentos por revisar (PENDING_REVIEW), documentos por vencer
// (EXPIRING_SOON) y modelos de vehículo por curar (PENDING_REVIEW). proto3 default 0 si la cola está vacía.
message ReviewQueueCountsReply {
  int32 docs_pending_review = 1;
  int32 docs_expiring_soon = 2;
  int32 models_pending_review = 3;
}

message GetByIdsRequest {
  repeated string ids = 1;
}

message VehiclesReply {
  repeated VehicleReply vehicles = 1;
}

message VehicleReply {
  string id = 1;
  string plate = 2;
  string make = 3;
  string model = 4;
  int32 year = 5;
  string color = 6;
  string doc_status = 7;
  bool active = 8;
  bool found = 9;
  string vehicle_type = 10;
  string status = 11;
}

message DriverVehiclesReply {
  string driver_id = 1;
  repeated VehicleReply vehicles = 2;
}

// Imagen de un documento (sub-lote 3A · múltiples imágenes). `side` = FRONT|BACK|SINGLE (string del enum).
message DocumentImageReply {
  string s3_key = 1;
  string side = 2;
  int32 order = 3;
}

message FleetDocumentReply {
  string id = 1;
  string owner_type = 2;
  string owner_id = 3;
  string type = 4;
  string document_number = 5;
  string status = 6;
  string expires_at = 7;
  // DEPRECADO (sub-lote 3A): primera imagen (backward-compat). Usar `images`. NO se proyecta al conductor.
  string file_s3_key = 8;
  string rejection_reason = 9;
  // Imágenes del documento (1..N caras). Admin review. El driver-bff mapea un subconjunto explícito.
  repeated DocumentImageReply images = 10;
}

message DriverDocumentsReply {
  string driver_id = 1;
  repeated FleetDocumentReply documents = 2;
}

// Vigencia de la ITV del vehículo OPERADO del conductor (gate de aprobación · compliance).
message DriverInspectionStatusReply {
  // ¿El conductor tiene un vehículo operado con inspección VIGENTE (passed && nextDueAt > now)?
  bool current = 1;
  // ¿El conductor tiene al menos un vehículo registrado? false ⇒ no puede operar (sin vehículo + ITV).
  bool has_vehicle = 2;
  // Vehículo evaluado (el operado). "" si el conductor no tiene vehículo.
  string vehicle_id = 3;
  // Placa del vehículo evaluado (para un mensaje de error legible). "" si no hay vehículo.
  string plate = 4;
  // Próximo vencimiento de la última inspección (ISO-8601). "" si nunca tuvo inspección.
  string next_due_at = 5;
  // ¿La última inspección del vehículo operado pasó? false si reprobó o no hay inspección.
  bool passed = 6;
  // Motivo de invalidez cuando current=false: NONE|NOT_PASSED|OVERDUE|NO_VEHICLE. "" si current=true.
  string invalid_reason = 7;
}
