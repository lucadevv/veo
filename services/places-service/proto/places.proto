syntax = "proto3";

package veo.places.v1;

// Contrato gRPC que places-service expone al public-bff (Lote B). CRUD de lugares guardados del
// pasajero. El userId NO viaja en el cuerpo: el BFF firma la identidad interna (HMAC) en la metadata
// gRPC (x-veo-identity / x-veo-identity-sig) y el servicio la verifica para resolver el userId del
// contexto autenticado. mTLS en producción (FOUNDATION §10).
service PlacesService {
  rpc ListByUser (Empty) returns (PlacesReply);
  rpc Save (SavePlaceRequest) returns (PlaceReply);
  rpc Update (UpdatePlaceRequest) returns (PlaceReply);
  rpc Remove (RemovePlaceRequest) returns (RemoveReply);
}

message Empty {}

enum PlaceKind {
  PLACE_KIND_UNSPECIFIED = 0;
  HOME = 1;
  WORK = 2;
  FAVORITE = 3;
}

message SavedPlace {
  string id = 1;
  PlaceKind kind = 2;
  string label = 3;
  // Dirección/subtítulo legible. "" si no se registró.
  string subtitle = 4;
  double lat = 5;
  double lng = 6;
  // ISO-8601 de creación (orden de favoritos).
  string created_at = 7;
  // ISO-8601 de última modificación.
  string updated_at = 8;
}

message SavePlaceRequest {
  PlaceKind kind = 1;
  string label = 2;
  string subtitle = 3;
  double lat = 4;
  double lng = 5;
}

message UpdatePlaceRequest {
  string id = 1;
  PlaceKind kind = 2;
  string label = 3;
  string subtitle = 4;
  double lat = 5;
  double lng = 6;
}

message RemovePlaceRequest {
  string id = 1;
}

message PlaceReply {
  SavedPlace place = 1;
}

message PlacesReply {
  repeated SavedPlace places = 1;
}

message RemoveReply {
  bool removed = 1;
}
