<!DOCTYPE html>
<html lang="es-PE">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VEO · Flujo Conductor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#121824;--surface:#1A2230;--surface2:#232B3C;--surface3:#2B3447;
    --ink:#EFF2F6;--ink-muted:#B3B7BF;--ink-subtle:#878C96;
    --border:#383D48;--border-strong:#515866;
    --brand:#54AAD1;--accent:#39BCDF;--accent-hover:#52CFF3;--on-accent:#0B111F;
    --success:#39BF89;--warn:#F2AF48;--danger:#F36164;--danger-hover:#FF7576;
    --route:#39BCDF;--route-glow:rgba(57,188,223,0.35);--overlay:rgba(4,7,13,0.6);
    --font-display:'Space Grotesk',sans-serif;--font-ui:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--font-ui);background:#eef0f2;color:var(--ink);}
  #root{height:100vh;}
  .bscreen{position:relative;width:390px;height:844px;background:var(--bg);color:var(--ink);font-family:var(--font-ui);overflow:hidden;display:flex;flex-direction:column;}
  .pad{padding:0 22px;}
  .display{font-family:var(--font-display);font-weight:600;letter-spacing:-.02em;line-height:1.05;}
  .eyebrow{font-weight:600;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);}
  .muted{color:var(--ink-muted);}.subtle{color:var(--ink-subtle);}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
  .statusbar{position:absolute;top:0;left:0;right:0;height:44px;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:14px 24px 0;font-weight:600;font-size:14px;pointer-events:none;}
  .statusbar .right{display:flex;align-items:center;gap:7px;}
  .nav-ind{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:4px;border-radius:3px;background:rgba(239,242,246,.4);z-index:60;}
  .btn{appearance:none;border:none;cursor:pointer;font-family:var(--font-ui);font-weight:600;border-radius:14px;height:54px;display:flex;align-items:center;justify-content:center;gap:9px;width:100%;font-size:16px;}
  .btn-accent{background:var(--accent);color:var(--on-accent);}
  .btn-ghost{background:transparent;color:var(--ink-muted);}
  .btn-surface{background:var(--surface2);color:var(--ink);border:1px solid var(--border);}
  .btn-success{background:var(--success);color:#06231a;}
  .btn-danger{background:var(--danger);color:#2a0708;}
  .btn-sm{height:46px;border-radius:12px;font-size:14px;}
  .btn-lg{height:58px;font-size:17px;}
  .iconbtn{width:44px;height:44px;border-radius:13px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink);flex:none;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;}
  .pill{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 13px;border-radius:99px;white-space:nowrap;background:var(--surface2);border:1px solid var(--border);font-size:13px;font-weight:500;color:var(--ink);}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .grabber{width:38px;height:5px;border-radius:3px;background:var(--border-strong);margin:0 auto;}
  .bsheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:24px 24px 0 0;border-top:1px solid var(--border);padding:12px 22px 26px;box-shadow:0 -24px 60px -20px rgba(0,0,0,.6);z-index:30;}
  .fieldlabel{font-size:12px;font-weight:600;color:var(--ink-muted);margin-bottom:8px;display:block;}
  .field{width:100%;height:52px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--ink);font-size:16px;padding:0 16px;display:flex;align-items:center;}
  .field .subtle{color:var(--ink-subtle);}
  .map{position:absolute;inset:0;background:#0d1420;overflow:hidden;}.map svg{position:absolute;inset:0;width:100%;height:100%;}
  .listrow{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
  .listrow:last-child{border-bottom:none;}
  .leadcircle{width:42px;height:42px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex:none;color:var(--ink-muted);}
  .ph-img{background:repeating-linear-gradient(135deg,#1e2738 0 9px,#1a2330 9px 18px);position:relative;overflow:hidden;}
  .ph-img .lbl{position:absolute;left:8px;bottom:7px;font-family:var(--font-mono);font-size:9px;color:var(--ink-subtle);background:rgba(8,12,18,.6);padding:2px 6px;border-radius:5px;}
  .seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:4px;gap:4px;}
  .seg .s{flex:1;color:var(--ink-muted);font-weight:600;font-size:14px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:7px;}
  .seg .s.on{background:var(--surface3);color:var(--ink);}
  .doc{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--surface);}
  .navbar{position:absolute;left:0;right:0;bottom:0;height:84px;background:rgba(18,24,36,.95);border-top:1px solid var(--border);display:flex;padding:10px 14px 22px;z-index:35;}
  .navbar .t{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-subtle);font-size:11px;font-weight:600;}
  .navbar .t.on{color:var(--accent);}
  @keyframes pr{0%{transform:scale(.7);opacity:.55;}80%,100%{transform:scale(2.1);opacity:0;}}
  .radar{position:relative;}.radar::before{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid var(--accent);animation:pr 2s ease-out infinite;}
  .halo{position:relative;}.halo::before{content:"";position:absolute;inset:-14px;border-radius:50%;background:radial-gradient(circle,var(--route-glow),transparent 70%);}
</style>
</head>
<body>
  <div id="root"></div>
  <script>(function(){try{localStorage.setItem('dc-viewport:'+location.pathname,JSON.stringify({x:90,y:40,scale:0.3}));}catch(e){}})();</script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
const I={

 bike:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-7h4l2 4M10 10l-1-3H7"/></svg>,
 cam:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L17 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.2"/></svg>,
 check:()=> <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5 9-10"/></svg>,
 chevR:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 6l6 6-6 6"/></svg>,
 money:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9a2.5 2 0 0 1 5 0c0 2.5-5 1.5-5 4a2.5 2 0 0 0 5 0" strokeLinecap="round"/></svg>,
 flame:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M12 3c1 3 4 4 4 8a4 4 0 0 1-8 0c0-1.5.5-2.5 1-3 .3 1 1 1.5 1.5 1.5C11 8 10 6 12 3Z"/></svg>,
 gift:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M3 12h18M12 8v13M12 8S10 3 7.5 4.5 9 8 12 8s2.5-2 4.5-3.5S12 8 12 8Z"/></svg>,
 life:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.5"/><path d="M5 5l4 4M19 5l-4 4M5 19l4-4M19 19l-4-4"/></svg>,
 minus:()=> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M5 12h14"/></svg>,
 plus:()=> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,

 dest:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M5 3v18M5 4h11l-2 3 2 3H5"/></svg>,
 alert:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M12 3l9 16H3z"/><path d="M12 10v4" strokeLinecap="round"/><circle cx="12" cy="16.5" r="0.6" fill="currentColor"/></svg>,
};
const Bar=()=>(<div className="statusbar"><span className="mono">9:41</span><div className="right">{I.signal()}{I.wifi()}{I.batt()}</div></div>);
const NI=()=> <div className="nav-ind"/>;

const Avatar=({size=44,label='KR'})=>(<div className="ph-img" style={{width:size,height:size,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--border)'}}><span className="mono" style={{fontSize:Math.max(8,size*0.18),color:'var(--ink-muted)'}}>{label}</span></div>);
const Screen=({children,bg})=> <div className="bscreen" style={bg?{background:bg}:null}>{children}</div>;
const BH=({t,size=22,onX})=>(<div className="pad" style={{paddingTop:54,paddingBottom:8,display:'flex',alignItems:'center',gap:12}}>{!onX&&<div className="iconbtn">{I.arrowL()}</div>}<h2 className="display" style={{fontSize:size,flex:1}}>{t}</h2>{onX&&<div className="iconbtn">{I.arrowL()}</div>}</div>);

function MapCanvas({mode='idle',carT=0.45,dim=false,heat=false}){
 const route="M 96 612 L 96 500 L 206 500 L 206 360 L 300 360 L 300 196";
 const pts=[[96,612],[96,500],[206,500],[206,360],[300,360],[300,196]];
 const cp=(()=>{const sl=[];let tot=0;for(let i=0;i<pts.length-1;i++){const l=Math.hypot(pts[i+1][0]-pts[i][0],pts[i+1][1]-pts[i][1]);sl.push(l);tot+=l;}let d=carT*tot;for(let i=0;i<sl.length;i++){if(d<=sl[i]){const f=d/sl[i];return{x:pts[i][0]+(pts[i+1][0]-pts[i][0])*f,y:pts[i][1]+(pts[i+1][1]-pts[i][1])*f,ang:Math.atan2(pts[i+1][1]-pts[i][1],pts[i+1][0]-pts[i][0])};}d-=sl[i];}return{x:300,y:196,ang:0};})();
 const sr=mode==='route'||mode==='trip';
 return(<div className="map"><svg viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
  <g opacity="0.5">{Array.from({length:7}).map((_,r)=>Array.from({length:5}).map((_,c)=>{const x=c*92-30+((r%2)*16),y=r*120-40;return <rect key={r+'-'+c} x={x} y={y} width="74" height="92" rx="6" fill="#15202f"/>;}))}</g>
  <g stroke="#202b3c" strokeWidth="9" fill="none" opacity="0.9"><path d="M-20 140 H410"/><path d="M-20 360 H410"/><path d="M-20 500 H410"/><path d="M-20 700 H410"/><path d="M96 -20 V860"/><path d="M206 -20 V860"/><path d="M300 -20 V860"/></g>
  {heat&&<g>{[[120,300,70,'#39BF89'],[260,560,80,'#F2AF48'],[300,250,60,'#F36164']].map((h,k)=><circle key={k} cx={h[0]} cy={h[1]} r={h[2]} fill={h[3]} opacity="0.16"/>)}</g>}
  {sr&&<><path d={route} fill="none" stroke="var(--route-glow)" strokeWidth="16" strokeLinecap="round" strokeLinejoin="round"/><path d={route} fill="none" stroke="var(--route)" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/><circle cx="96" cy="612" r="9" fill="#121824" stroke="var(--accent)" strokeWidth="3.5"/><g><circle cx="300" cy="196" r="13" fill="var(--accent)"/><circle cx="300" cy="196" r="5" fill="#121824"/></g></>}
  {mode==='trip'&&<g transform={`translate(${cp.x} ${cp.y}) rotate(${cp.ang*180/Math.PI+90})`}><rect x="-13" y="-19" width="26" height="38" rx="9" fill="#121824" stroke="var(--accent)" strokeWidth="2.5"/><rect x="-7" y="-12" width="14" height="9" rx="2.5" fill="var(--accent)" opacity=".85"/></g>}
  {(mode==='idle'||mode==='avail')&&<><circle cx="195" cy="430" r="22" fill="var(--route-glow)"/><circle cx="195" cy="430" r="9" fill={mode==='avail'?'var(--success)':'var(--accent)'} stroke="#121824" strokeWidth="3"/></>}
 </svg>{dim&&<div style={{position:'absolute',inset:0,background:'rgba(13,20,32,.62)'}}/>}</div>);
}

const Splash=()=>(<Screen bg="radial-gradient(90% 55% at 78% 14%, rgba(57,188,223,.16) 0%, transparent 55%), linear-gradient(180deg,#13202e 0%,#101725 45%,#121824 100%)"><Bar/>
 <svg viewBox="0 0 390 844" style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.55}}><path d="M-10 720 C 120 660, 90 470, 230 430 S 360 250, 330 120" fill="none" stroke="var(--route-glow)" strokeWidth="2.5" strokeDasharray="2 9" strokeLinecap="round"/><circle cx="330" cy="120" r="5" fill="var(--accent)"/></svg>
 <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative'}}><WM size={32}/><p className="muted" style={{marginTop:14,fontSize:15}}>Maneja. Gana. Protegido.</p></div>
 <div className="pad" style={{paddingBottom:40,position:'relative'}}><div style={{height:4,borderRadius:99,background:'var(--surface2)',overflow:'hidden',width:72,margin:'0 auto'}}><div style={{height:'100%',width:'45%',background:'var(--accent)',borderRadius:99}}/></div></div><NI/></Screen>);

function Login(){return(<Screen><Bar/>
 <div className="pad" style={{paddingTop:64,flex:1}}>
  <WM size={20}/>

 </div>
 <div className="pad" style={{paddingBottom:32}}><div className="btn btn-accent btn-lg">Enviar código</div></div><NI/></Screen>);}

const OtpC=()=>(<Screen><Bar/>
 <div className="pad" style={{paddingTop:60,flex:1}}>
  <div className="iconbtn" style={{marginBottom:22}}>{I.arrowL()}</div>
  <h1 className="display" style={{fontSize:30}}>Código</h1>
