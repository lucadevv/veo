<!DOCTYPE html>
<html lang="es-PE">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VEO · Flujo Pasajero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0E1014; --surface:#15181E; --surface2:#1C2027; --surface3:#21262F;
    --ink:#F4F6F8; --ink-muted:#A6ADBA; --ink-subtle:#6B7280;
    --border:#262B33; --border-strong:#353B45;
    --accent:#C8F230; --accent-hover:#D6F84A; --on-accent:#0E1014;
    --success:#34D399; --warn:#F2AF48; --danger:#FF3B30; --danger-hover:#FF5247;
    --route:#C8F230; --route-glow:rgba(200,242,48,0.35);
    --overlay:rgba(6,8,12,0.66);
    --font-display:'Space Grotesk',sans-serif;
    --font-ui:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--font-ui);background:#f4f4f5;color:var(--ink);}
  #root{height:100vh;}

  .bscreen{position:relative;width:390px;height:844px;background:var(--bg);color:var(--ink);
    font-family:var(--font-ui);overflow:hidden;display:flex;flex-direction:column;}
  .pad{padding:0 22px;}
  .display{font-family:var(--font-display);font-weight:600;letter-spacing:-.02em;line-height:1.05;}
  .eyebrow{font-family:var(--font-ui);font-weight:600;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);}
  .muted{color:var(--ink-muted);}
  .subtle{color:var(--ink-subtle);}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}

  .statusbar{position:absolute;top:0;left:0;right:0;height:50px;z-index:60;display:flex;align-items:center;
    justify-content:space-between;padding:15px 28px 0;font-weight:600;font-size:15px;pointer-events:none;}
  .statusbar .time{font-variant-numeric:tabular-nums;}
  .statusbar .right{display:flex;align-items:center;gap:7px;}
  .island{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:116px;height:32px;background:#000;border-radius:18px;z-index:61;}
  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(244,246,248,.5);z-index:60;}

  .btn{appearance:none;border:none;cursor:pointer;font-family:var(--font-ui);font-weight:600;border-radius:16px;height:54px;
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;font-size:16px;}
  .btn-accent{background:var(--accent);color:var(--on-accent);}
  .btn-light{background:var(--ink);color:#0c0d10;}
  .btn-ghost{background:transparent;color:var(--ink-muted);}
  .btn-surface{background:var(--surface2);color:var(--ink);border:1px solid var(--border);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{height:44px;border-radius:13px;font-size:14px;}
  .iconbtn{width:44px;height:44px;border-radius:14px;background:var(--surface2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;color:var(--ink);flex:none;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;}
  .pill{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 13px;border-radius:99px;white-space:nowrap;
    background:var(--surface2);border:1px solid var(--border);font-size:13px;font-weight:500;color:var(--ink);}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .grabber{width:38px;height:5px;border-radius:3px;background:var(--border-strong);margin:0 auto;}
  .bsheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:26px 26px 0 0;
    border-top:1px solid var(--border);padding:12px 22px 28px;box-shadow:0 -24px 60px -20px rgba(0,0,0,.7);z-index:30;}
  .fieldlabel{font-size:12px;font-weight:600;color:var(--ink-muted);margin-bottom:8px;display:block;}
  .field{width:100%;height:54px;background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;
    color:var(--ink);font-family:var(--font-ui);font-size:16px;padding:0 16px;display:flex;align-items:center;}
  .map{position:absolute;inset:0;background:#0b0d11;overflow:hidden;}
  .map svg{position:absolute;inset:0;width:100%;height:100%;}
  .listrow{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
  .listrow:last-child{border-bottom:none;}
  .leadcircle{width:42px;height:42px;border-radius:13px;background:var(--surface2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;flex:none;color:var(--ink-muted);}
  .ph-img{background:repeating-linear-gradient(135deg,#1a1e25 0 9px,#161a20 9px 18px);position:relative;overflow:hidden;}
  .ph-img .lbl{position:absolute;left:8px;bottom:7px;font-family:var(--font-mono);font-size:9px;color:var(--ink-subtle);
    background:rgba(8,9,12,.6);padding:2px 6px;border-radius:5px;}
  .vehrow{display:flex;align-items:center;gap:14px;padding:14px;border-radius:18px;border:1.5px solid var(--border);background:var(--surface);}
  .vehrow.sel{border-color:var(--accent);background:linear-gradient(0deg,rgba(200,242,48,.06),rgba(200,242,48,.06)),var(--surface);}
  .badge-eco{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--on-accent);background:var(--accent);border-radius:6px;padding:3px 7px;}
  .check{width:24px;height:24px;border-radius:8px;border:1.8px solid var(--border-strong);flex:none;display:flex;align-items:center;justify-content:center;}
  .check.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent);}
  .seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:4px;gap:4px;}
  .seg .s{flex:1;color:var(--ink-muted);font-weight:600;font-size:13px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
  .seg .s.on{background:var(--surface3);color:var(--ink);}
  .radar{position:relative;}
</style>
</head>
<body>
  <div id="root"></div>
  <script>
  /* Abrir SIEMPRE mostrando el flujo desde arriba, alejado, para ver todo */
  (function(){try{localStorage.setItem('dc-viewport:'+location.pathname,JSON.stringify({x:90,y:40,scale:0.3}));}catch(e){}})();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
const I = {
  signal:()=> <svg width="18" height="12" viewBox="0 0 18 12"><g fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>,
  wifi:()=> <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.4c2.6 0 5 1 6.8 2.7l1.4-1.5A11.4 11.4 0 0 0 8.5.4 11.4 11.4 0 0 0 .3 3.6L1.7 5A9.4 9.4 0 0 1 8.5 2.4Z"/><path d="M8.5 6c1.4 0 2.7.5 3.7 1.4l1.4-1.5A7.4 7.4 0 0 0 8.5 4 7.4 7.4 0 0 0 3.4 5.9l1.4 1.5A5.4 5.4 0 0 1 8.5 6Z"/><path d="M8.5 9.5 10.6 7.4A3 3 0 0 0 8.5 6.6 3 3 0 0 0 6.4 7.4Z"/></svg>,

  arrowL:()=> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,

  pin:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 21s7-6.2 7-11a7 7 0 1 0-14 0c0 4.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg>,
  home:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>,

  star:(f)=> <svg width="14" height="14" viewBox="0 0 24 24" fill={f?'currentColor':'none'} stroke="currentColor" strokeWidth="1.6"><path d="M12 3l2.6 5.3 5.9.9-4.2 4.1 1 5.8L12 17.8 6.7 19.2l1-5.8L3.5 9.2l5.9-.9z"/></svg>,
  phone:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M5 3h3l2 5-2.5 1.5a12 12 0 0 0 6 6L19 16l-1 3"/><path d="M16 21a13 13 0 0 1-13-13"/></svg>,
  chat:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M21 12a8 8 0 0 1-11.5 7.2L4 20l1-4.7A8 8 0 1 1 21 12Z"/></svg>,
  shield:()=> <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M12 3l7 3v5c0 4.4-3 8.3-7 10-4-1.7-7-5.6-7-10V6z"/></svg>,
  eye:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>,
  share:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="18" cy="18" r="2.5"/><path d="M8.2 10.8 15.8 7M8.2 13.2 15.8 17"/></svg>,
  check:()=> <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5 9-10"/></svg>,
  chevR:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 6l6 6-6 6"/></svg>,
  lock:()=> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>,
  cam:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L17 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.2"/></svg>,
  minus:()=> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M5 12h14"/></svg>,
  plus:()=> <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  card:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2.5" y="5" width="19" height="14" rx="2.5"/><path d="M2.5 9.5h19"/></svg>,
  users:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><circle cx="9" cy="8" r="3.4"/><path d="M3.5 19.5a5.5 5.5 0 0 1 11 0"/><path d="M16 5a3.3 3.3 0 0 1 0 6.3"/><path d="M17.5 14a5 5 0 0 1 3.2 5"/></svg>,
  link:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M10 13a4 4 0 0 0 5.7.3l3-3A4 4 0 0 0 13 5l-1.5 1.5"/><path d="M14 11a4 4 0 0 0-5.7-.3l-3 3A4 4 0 0 0 11 19l1.5-1.5"/></svg>,
  copy:()=> <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><rect x="9" y="9" width="12" height="12" rx="2.5"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
  child:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><circle cx="12" cy="6.5" r="3"/><path d="M6 21v-2a6 6 0 0 1 12 0v2"/></svg>,
  scan:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="11" r="2.6"/><path d="M8.5 16.5a4 4 0 0 1 7 0"/></svg>,
  power:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 3v9"/><path d="M6.5 7a8 8 0 1 0 11 0"/></svg>,
  route:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="19" r="2.2"/><circle cx="18" cy="5" r="2.2"/><path d="M8.2 19H15a3.5 3.5 0 0 0 0-7H9a3.5 3.5 0 0 1 0-7h6.8"/></svg>,
  gift:()=> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M3 12h18M12 8v13M12 8S10 3 7.5 4.5 9 8 12 8s2.5-2 4.5-3.5S12 8 12 8Z"/></svg>,

};

function StatusBar({dark}){const c=dark?'#0c0d10':'#F4F6F8';return(<div className="statusbar" style={{color:c}}><span className="time">9:41</span><div className="right">{I.signal()}{I.wifi()}{I.batt()}</div></div>);}
const Wordmark=({size=26,color='var(--ink)'})=>(<div style={{display:'flex',alignItems:'center',gap:9}}><span className="display" style={{fontSize:size,fontWeight:700,color}}>VEO</span><span style={{width:size*0.30,height:size*0.30,borderRadius:'50%',background:'var(--accent)',marginTop:size*0.10,boxShadow:'0 0 14px var(--route-glow)'}}/></div>);
const Avatar=({size=42,label='TÚ'})=>(<div className="ph-img" style={{width:size,height:size,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--border)'}}><span style={{fontFamily:'var(--font-mono)',fontSize:Math.max(8,size*0.16),color:'var(--ink-muted)'}}>{label}</span></div>);
const Screen=({children,bg})=> <div className="bscreen" style={bg?{background:bg}:null}>{children}</div>;

function MapCanvas({mode='idle',carT=0.45,dim=false}){
  const route="M 96 612 L 96 500 L 206 500 L 206 360 L 300 360 L 300 196";
  const pts=[[96,612],[96,500],[206,500],[206,360],[300,360],[300,196]];
  const cp=(()=>{const sl=[];let tot=0;for(let i=0;i<pts.length-1;i++){const l=Math.hypot(pts[i+1][0]-pts[i][0],pts[i+1][1]-pts[i][1]);sl.push(l);tot+=l;}let d=carT*tot,ang=0;for(let i=0;i<sl.length;i++){if(d<=sl[i]){const f=d/sl[i];return{x:pts[i][0]+(pts[i+1][0]-pts[i][0])*f,y:pts[i][1]+(pts[i+1][1]-pts[i][1])*f,ang:Math.atan2(pts[i+1][1]-pts[i][1],pts[i+1][0]-pts[i][0])};}d-=sl[i];}return{x:300,y:196,ang:0};})();
  const showRoute=mode==='route'||mode==='trip';
  return(<div className="map"><svg viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
    <g opacity="0.55">{Array.from({length:7}).map((_,r)=>Array.from({length:5}).map((_,c)=>{const x=c*92-30+((r%2)*16),y=r*120-40;return <rect key={r+'-'+c} x={x} y={y} width="74" height="92" rx="6" fill="#13161c"/>;}))}</g>
    <g stroke="#1c2128" strokeWidth="9" fill="none" opacity="0.9"><path d="M-20 140 H410"/><path d="M-20 360 H410"/><path d="M-20 500 H410"/><path d="M-20 700 H410"/><path d="M96 -20 V860"/><path d="M206 -20 V860"/><path d="M300 -20 V860"/></g>
    <g stroke="#10141a" strokeWidth="3" fill="none"><path d="M-20 220 H410"/><path d="M-20 620 H410"/><path d="M150 -20 V860"/><path d="M350 -20 V860"/></g>
    <rect x="222" y="150" width="120" height="120" rx="14" fill="#121a16" opacity="0.8"/>
    {showRoute&&<><path d={route} fill="none" stroke="var(--route-glow)" strokeWidth="16" strokeLinecap="round" strokeLinejoin="round"/><path d={route} fill="none" stroke="var(--route)" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/><circle cx="96" cy="612" r="9" fill="#0E1014" stroke="var(--accent)" strokeWidth="3.5"/><g><circle cx="300" cy="196" r="13" fill="var(--accent)"/><circle cx="300" cy="196" r="5" fill="#0E1014"/></g></>}
    {mode==='idle'&&<><circle cx="195" cy="430" r="22" fill="var(--route-glow)"/><circle cx="195" cy="430" r="8" fill="var(--accent)" stroke="#0E1014" strokeWidth="3"/></>}
    {mode==='trip'&&<g transform={`translate(${cp.x} ${cp.y}) rotate(${cp.ang*180/Math.PI+90})`}><rect x="-13" y="-19" width="26" height="38" rx="9" fill="#0E1014" stroke="var(--accent)" strokeWidth="2.5"/><rect x="-7" y="-12" width="14" height="9" rx="2.5" fill="var(--accent)" opacity=".85"/><rect x="-7" y="3" width="14" height="8" rx="2.5" fill="#2a2f38"/></g>}
  </svg>{dim&&<div style={{position:'absolute',inset:0,background:'rgba(10,11,14,.55)'}}/>}</div>);
}

/* ============ SECCIÓN 1 · BIENVENIDA Y REGISTRO ============ */
const S_Splash=()=>(
  <Screen bg="radial-gradient(90% 55% at 78% 12%, rgba(200,242,48,.13) 0%, transparent 55%), linear-gradient(180deg,#0d1216 0%, #0b0e12 40%, #0E1014 100%)">
    <StatusBar/>
    <svg viewBox="0 0 390 844" style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.5}}><path d="M-10 700 C 120 640, 90 460, 230 420 S 360 250, 330 120" fill="none" stroke="var(--route-glow)" strokeWidth="2" strokeDasharray="2 9" strokeLinecap="round"/><circle cx="330" cy="120" r="5" fill="var(--accent)"/></svg>
    <div className="pad" style={{paddingTop:72,position:'relative'}}><Wordmark size={26}/></div>
    <div style={{flex:1}}/>
    <div className="pad" style={{paddingBottom:40,position:'relative'}}>
      <div className="eyebrow" style={{marginBottom:16}}>YO VEO · TÚ VAS SEGURO</div>
      <h1 className="display" style={{fontSize:46,fontWeight:600}}>Tu familia<br/>te ve llegar.</h1>

    <p className="muted" style={{fontSize:14,marginBottom:16}}>Guarda tus lugares para pedir más rápido. Se guardan solo en este equipo.</p>
    <div className="card" style={{padding:'2px 16px',marginBottom:14}}><PRow icon={I.home} title="Casa" sub="Av. Pardo 1245, Miraflores"/><PRow icon={I.work} title="Trabajo" sub="San Isidro Financial"/></div>
    <div className="fieldlabel" style={{textTransform:'uppercase',letterSpacing:'.1em',fontSize:11}}>Favoritos</div>
    <div className="card" style={{padding:'2px 16px',marginBottom:14}}><PRow icon={I.star} title="Larcomar" sub="Malecón de la Reserva 610"/></div>
    <div className="btn btn-surface btn-sm">{I.plus()} Agregar favorito</div>
  </div><div className="home-ind"/></Screen>);
const S_Scheduled=()=>(<Screen><StatusBar/><BH t="Viajes programados" size={20}/>
  <div className="pad" style={{flex:1}}>
    <div className="card" style={{padding:16,marginBottom:12}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span className="pill" style={{borderColor:'var(--accent)',color:'var(--accent)'}}><span className="dot" style={{background:'var(--accent)'}}/>Mañana · 7:30 a. m.</span><span className="mono" style={{fontWeight:700}}>S/ 14.00</span></div><div className="subtle" style={{fontSize:13,marginBottom:12}}>Casa → Aeropuerto Jorge Chávez</div><div className="btn btn-surface btn-sm">Cancelar</div></div>
    <div className="card" style={{padding:16}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><span className="pill" style={{borderColor:'var(--accent)',color:'var(--accent)'}}><span className="dot" style={{background:'var(--accent)'}}/>Vie · 6:00 p. m.</span><span className="mono" style={{fontWeight:700}}>S/ 11.00</span></div><div className="subtle" style={{fontSize:13,marginBottom:12}}>Trabajo → Casa</div><div className="btn btn-surface btn-sm">Cancelar</div></div>
  </div><div className="home-ind"/></Screen>);
const S_Referrals=()=>(<Screen><StatusBar/><BH t="Invita y gana"/>
  <div className="pad" style={{flex:1}}>
    <p className="muted" style={{fontSize:14,marginBottom:16}}>Comparte tu código y ganen los dos S/ 10 en su primer viaje.</p>
    <div className="card" style={{padding:'24px 16px',textAlign:'center',marginBottom:16,background:'radial-gradient(80% 90% at 50% 0%, rgba(200,242,48,.08), transparent), var(--surface)'}}><div className="fieldlabel" style={{marginBottom:8}}>Tu código</div><div className="display" style={{fontSize:34,color:'var(--accent)',letterSpacing:'.08em'}}>MAFE-2026</div><div style={{display:'flex',gap:10,marginTop:18}}><div className="btn btn-surface btn-sm">{I.copy()} Copiar</div><div className="btn btn-accent btn-sm">{I.share()} Compartir</div></div></div>
    <div style={{display:'flex',gap:12}}><div className="card" style={{flex:1,padding:16,textAlign:'center'}}><div className="mono" style={{fontSize:26,fontWeight:700}}>4</div><div className="subtle" style={{fontSize:12,marginTop:2}}>Referidos</div></div><div className="card" style={{flex:1,padding:16,textAlign:'center'}}><div className="mono" style={{fontSize:26,fontWeight:700}}>S/ 40</div><div className="subtle" style={{fontSize:12,marginTop:2}}>Crédito ganado</div></div></div>
  </div><div className="home-ind"/></Screen>);
const S_Help=()=>(<Screen><StatusBar/><BH t="Ayuda"/>
  <div className="pad" style={{flex:1}}>
    <div className="card" style={{padding:'16px',marginBottom:16,display:'flex',alignItems:'center',gap:13,background:'var(--surface2)'}}><div className="leadcircle" style={{color:'var(--accent)'}}>{I.help()}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:15}}>¿Necesitas ayuda?</div><div className="subtle" style={{fontSize:12}}>Reporta un problema y te respondemos.</div></div></div>
    <div className="fieldlabel" style={{textTransform:'uppercase',letterSpacing:'.1em',fontSize:11}}>Preguntas frecuentes</div>
    <div className="card" style={{padding:'2px 16px',marginBottom:16}}>{[['¿Cómo pido un viaje?',true],['¿Cómo funciona el pago?',false],['¿Qué es la cámara de cabina?',false],['¿Cómo funciona el SOS?',false]].map((f,k)=>(<div key={k} style={{borderBottom:k<3?'1px solid var(--border)':'none'}}><div style={{display:'flex',alignItems:'center',gap:10,padding:'15px 0'}}><span style={{flex:1,fontWeight:600,fontSize:14}}>{f[0]}</span><span className="subtle" style={{transform:f[1]?'rotate(90deg)':'none'}}>{I.chevR()}</span></div>{f[1]&&<p className="subtle" style={{fontSize:13,lineHeight:1.5,paddingBottom:14}}>Pon tu destino, ofrece tu tarifa y elige al conductor que mejor te convenga.</p>}</div>))}</div>
    <div className="btn btn-accent">Reportar un problema</div>
  </div><div className="home-ind"/></Screen>);
const S_History=()=>(<Screen><StatusBar/><BH t="Viajes"/>
  <div className="pad" style={{flex:1}}>{[['Jockey Plaza, Surco','Hoy · 9:42 a. m. · Completado','13.00'],['Aeropuerto J. Chávez','Ayer · 6:15 p. m. · Completado','22.50'],['Parque Kennedy','12 may · 8:30 a. m. · Cancelado','—']].map((t,k)=>(<div key={k} className="card" style={{padding:16,marginBottom:10,display:'flex',alignItems:'center',gap:14}}><div className="leadcircle" style={{color:'var(--accent)'}}>{I.pin()}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:15}}>{t[0]}</div><div className="subtle" style={{fontSize:12}}>{t[1]}</div></div><div style={{textAlign:'right'}}><div className="mono" style={{fontWeight:700,fontSize:15}}>{t[2]==='—'?'—':'S/ '+t[2]}</div><span className="subtle">{I.chevR()}</span></div></div>))}</div><div className="home-ind"/></Screen>);
const S_TripDetail=()=>(<Screen><StatusBar/>
  <div style={{position:'relative',height:280}}><MapCanvas mode="route"/><div className="pad" style={{position:'absolute',top:60,zIndex:20}}><div className="iconbtn" style={{boxShadow:'0 8px 24px rgba(0,0,0,.5)'}}>{I.arrowL()}</div></div></div>
  <div className="pad" style={{flex:1,paddingTop:18}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><h2 className="display" style={{fontSize:21}}>Viaje a Jockey Plaza</h2><span className="pill" style={{borderColor:'rgba(52,211,153,.4)',color:'var(--success)'}}><span className="dot" style={{background:'var(--success)'}}/>Completado</span></div>
    <div className="card" style={{padding:16,marginBottom:14}}><div style={{display:'flex',justifyContent:'space-between',padding:'4px 0'}}><span className="muted">Tarifa</span><span className="mono">S/ 13.00</span></div><div style={{display:'flex',justifyContent:'space-between',padding:'4px 0'}}><span className="muted">Método</span><span>Tarjeta</span></div><div style={{height:1,background:'var(--border)',margin:'8px 0'}}/><div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontWeight:700}}><span>Total</span><span className="mono">S/ 13.00</span></div></div>
    <div className="btn btn-surface btn-sm">{I.share()} Compartir recibo</div>
  </div><div className="home-ind"/></Screen>);

ReactDOM.createRoot(document.getElementById('root')).render(<Board/>);
