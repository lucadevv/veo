<!DOCTYPE html>
<html lang="es-PE">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VEO · Flujo Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>*{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}body{font-family:'Inter',sans-serif;background:#eef0f2;}#root{height:100vh;}
  .adm-frame{width:1360px;height:850px;position:relative;overflow:hidden;background:#f4f6f9;}
  .adm-frame .app{border-radius:0 !important;box-shadow:none !important;}
</style>
</head>
<body>
  <div id="root"></div>
  <script>(function(){try{localStorage.setItem('dc-viewport:'+location.pathname,JSON.stringify({x:70,y:40,scale:0.26}));}catch(e){}})();</script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../design-canvas.jsx"></script>
  <script type="text/babel" src="admin-screens.jsx" data-presets="react"></script>
  <script type="text/babel" data-presets="react">
/* Reusa window.ADM sin redeclarar globals (Ops, I, NAV ya existen en admin-screens.jsx) */
const NOOP=()=>{};
function AdmShell({cur,section,banner=true}){
 const A=window.ADM, Ic=A.I;
 return(<div className="adm-frame"><div className="app">
  <div className="side">
   <div className="brand"><div style={{width:30,height:30,borderRadius:8,background:'var(--accent)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{Ic.shield()}</div><div style={{fontWeight:700,fontSize:16,color:'#fff'}}>VEO <span style={{color:'#7b86a0',fontWeight:500,fontSize:13}}>Admin</span></div></div>
   {A.NAV.map((g,i)=>(<div key={i}><div className="grp">{g[0]}</div>{g[1].map(it=>(<div key={it[0]} className={'nav'+(cur===it[0]?' on':'')}>{it[2]()}<span>{it[1]}</span>{it[3]&&<span className="ct">2</span>}</div>))}</div>))}
   <div style={{marginTop:'auto',display:'flex',alignItems:'center',gap:10,padding:'10px 8px',borderTop:'1px solid rgba(255,255,255,.08)'}}><div style={{width:30,height:30,borderRadius:'50%',background:'#2a3454',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>OP</div><div style={{fontSize:12}}><div style={{color:'#fff',fontWeight:600}}>Operador L2</div><div style={{color:'#7b86a0'}}>SUPPORT_L2</div></div></div>
  </div>
  <div className="main">
   <div className="top"><div className="search">{Ic.search()} Buscar viaje, conductor, ID…</div><div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:10}}><span className="badge" style={{background:'var(--success-soft)',color:'var(--success)'}}>{Ic.lock()} MFA fresco</span><div style={{width:34,height:34,borderRadius:8,background:'var(--surface2)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--ink-muted)'}}>{Ic.sun()}</div></div></div>
   {banner&&<div className="panicbar"><span className="pulse" style={{display:'flex',alignItems:'center',gap:8}}>{Ic.shieldAlert()} PÁNICO ACTIVO · 2 alertas en curso</span><span style={{opacity:.85,fontWeight:500}}>Viaje a4f29b1c · hace 2 min</span><div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}><div className="btn btn-sm" style={{background:'#fff',color:'var(--danger)'}}>Atender</div><span style={{opacity:.8}}>{Ic.x()}</span></div></div>}
   <div className="body">{section}</div>
  </div>
 </div></div>);
}
function AdmLogin(){
 const Ic=window.ADM.I;
 return(<div className="adm-frame"><div className="app" style={{alignItems:'center',justifyContent:'center',background:'#0f1626'}}>
  <div className="card" style={{width:380,padding:30}}>
   <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}><div style={{width:36,height:36,borderRadius:9,background:'var(--accent)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{Ic.shield()}</div><div><div style={{fontWeight:700,fontSize:17}}>VEO</div><div className="sub" style={{fontSize:12}}>Operación y Seguridad</div></div></div>
   <div style={{fontWeight:700,fontSize:18,marginTop:18}}>Inicia sesión</div><div className="muted" style={{fontSize:13,marginTop:4,marginBottom:18}}>Acceso restringido al personal autorizado.</div>
   <label style={{fontSize:12,fontWeight:600,color:'var(--ink-muted)'}}>Correo corporativo</label><div style={{height:44,margin:'6px 0 12px',border:'1px solid var(--border-strong)',borderRadius:9,padding:'0 12px',fontSize:14,display:'flex',alignItems:'center'}}>operador@veo.pe</div>
   <label style={{fontSize:12,fontWeight:600,color:'var(--ink-muted)'}}>Contraseña</label><div style={{height:44,margin:'6px 0 12px',border:'1px solid var(--border-strong)',borderRadius:9,padding:'0 12px',fontSize:14,display:'flex',alignItems:'center',letterSpacing:'.2em'}}>••••••••</div>
   <label style={{fontSize:12,fontWeight:600,color:'var(--ink-muted)'}}>Código TOTP</label><div className="mono" style={{height:44,margin:'6px 0 16px',border:'1px solid var(--border-strong)',borderRadius:9,padding:'0 12px',fontSize:16,letterSpacing:'.2em',textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center'}}>481 207</div>
   <div className="btn btn-accent" style={{width:'100%'}}>Continuar</div>
  </div></div></div>);
}
function AdmBoard(){
 const A=window.ADM;
 return(<DesignCanvas style={{background:'#eef0f2'}}>
  <DCSection id="ad1" title="VEO Admin — el cerebro" subtitle="Login con MFA → operación en vivo → seguridad/pánicos → flota, finanzas, video y auditoría · RBAC, doble auth, todo auditado">
   <DCArtboard id="login" label="Login · correo + contraseña + TOTP" width={1360} height={850}><AdmLogin/></DCArtboard>
   <DCArtboard id="ops" label="Operación en vivo · KPIs + mapa" width={1360} height={850}><AdmShell cur="ops" section={<A.Ops go={NOOP} panicsOpen={2}/>}/></DCArtboard>
   <DCArtboard id="triplive" label="Detalle de viaje en vivo" width={1360} height={850}><AdmShell cur="ops" section={<A.TripLive go={NOOP} notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="reports" label="Reportes · tendencias" width={1360} height={850}><AdmShell cur="reports" section={<A.Reports/>}/></DCArtboard>
   <DCArtboard id="revenue" label="Ingresos · cómo gana VEO" width={1360} height={850}><AdmShell cur="revenue" section={<A.Revenue/>}/></DCArtboard>
   <DCArtboard id="roles" label="Roles y accesos · RBAC" width={1360} height={850}><AdmShell cur="roles" section={<A.Roles notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="driverdetail" label="Perfil de conductor" width={1360} height={850}><AdmShell cur="drivers" section={<A.DriverDetail go={NOOP} notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="adminsearch" label="Búsqueda funcional" width={1360} height={850}><AdmShell cur="ops" section={<A.AdminSearch go={NOOP}/>}/></DCArtboard>
   <DCArtboard id="adminaccess" label="Accesibilidad e idioma" width={1360} height={850}><AdmShell cur="adminaccess" section={<A.AdminAccess notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="panics" label="Seguridad · cola de pánicos" width={1360} height={850}><AdmShell cur="panics" section={<A.Panics go={NOOP}/>}/></DCArtboard>
   <DCArtboard id="panicDetail" label="Pánico · detalle + evidencia" width={1360} height={850}><AdmShell cur="panics" section={<A.PanicDetail go={NOOP} notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="drivers" label="Conductores · aprobar altas" width={1360} height={850}><AdmShell cur="drivers" section={<A.Drivers notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="fleet" label="Flota · vencimientos" width={1360} height={850}><AdmShell cur="fleet" section={<A.Fleet/>}/></DCArtboard>
   <DCArtboard id="pricing" label="Tarifas y zonas · motor del precio" width={1360} height={850}><AdmShell cur="pricing" section={<A.Pricing notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="finance" label="Finanzas · liquidaciones (rol FINANCE)" width={1360} height={850}><AdmShell cur="finance" section={<A.Finance notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="tickets" label="Soporte · tickets" width={1360} height={850}><AdmShell cur="tickets" section={<A.Tickets go={NOOP} notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="media" label="Video · doble auth (MFA)" width={1360} height={850}><AdmShell cur="media" section={<A.Media notify={NOOP}/>}/></DCArtboard>
   <DCArtboard id="audit" label="Auditoría · cadena de hash" width={1360} height={850}><AdmShell cur="audit" section={<A.Audit notify={NOOP}/>}/></DCArtboard>
  </DCSection>
 </DesignCanvas>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<AdmBoard/>);
  </script>
</body>
</html>
