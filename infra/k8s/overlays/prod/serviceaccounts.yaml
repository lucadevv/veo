# ServiceAccounts con IRSA · overlay prod
# Patron de rol (terraform modules/iam-roles): arn:aws:iam::<ACCOUNT_ID>:role/veo-prod-irsa-<sa>
# PLACEHOLDER: 000000000000 = account ID real de AWS (terraform: data.aws_caller_identity).
# Reemplazar UNA vez conocido el account del entorno prod.
# GAP terraform: biometric-service, chat-service y external-secrets NO estan en
# locals.service_accounts de envs/prod — agregar para que exista el rol IRSA.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-service
  labels: { app: identity-service }
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/veo-prod-irsa-identity-service
---
