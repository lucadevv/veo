# SecretStore contra AWS Secrets Manager · overlay prod
# Region: us-east-1 (terraform envs/prod/variables.tf · var.region).
# Auth: IRSA via el ServiceAccount external-secrets (serviceaccounts.yaml).
# Requiere el operador ESO instalado (argocd/applications/external-secrets.yaml).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
