# ConfigMaps `<svc>-config` · overlay dev
# Solo config NO secreta (lo secreto lo materializa ESO en `<svc>-secrets`).
# Claves con default sano en env.schema.ts NO se repiten aca (el contrato es el schema).
# KAFKA_BROKERS: placeholder — llenar con `terraform output` de module.msk (no derivable en repo).
# identity: VEO_EMAIL_MODE/VEO_SMS_MODE/VEO_OAUTH_MODE quedan en su default del schema; fijar por entorno cuando se decida el proveedor.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  labels: { app: identity-service }
data:
  LOG_LEVEL: "debug"
  KAFKA_BROKERS: "PENDIENTE_MSK_BOOTSTRAP_BROKERS"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  JWT_ISSUER: "veo-identity"
  JWT_AUDIENCE: "veo-app"
---
