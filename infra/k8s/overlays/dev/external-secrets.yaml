    - secretKey: db_port
      remoteRef: { key: veo/dev/rds/shared, property: port }
    - secretKey: db_dbname
      remoteRef: { key: veo/dev/rds/shared, property: dbname }
    - secretKey: redis_auth_token
      remoteRef: { key: veo/dev/redis/shared, property: auth_token }
    - secretKey: redis_host
