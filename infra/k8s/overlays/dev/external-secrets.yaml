# ExternalSecrets · overlay dev
# Materializan los Secret `<svc>-secrets` que los Deployments referencian via envFrom,
# desde AWS Secrets Manager (paths veo/dev/... creados por terraform — NO inventar paths).
# Mapeo DB (terraform locals): RDS dedicada = identity/payment/panic/audit; el resto usa rds/shared.
# DATABASE_URL replica la convencion de services/*/env/development.env (?schema=<svc>) + sslmode=require
# (rds.force_ssl=1 en modules/rds-postgres).
# Secrets gestionados (Kind=managed en terraform): se siembran con {"placeholder":"REPLACE_ME_OUT_OF_BAND"};
# ESO NO materializa el Secret del servicio hasta que un operador cargue en ASM las keys del contrato
# comentado en cada bloque (mientras tanto el pod queda en CreateContainerConfigError).
# GAP identity-service: SMTP_USER/SMTP_PASS (solo VEO_EMAIL_MODE=live) existen en
# veo/<env>/notification/smtp-credentials pero NO se cablean aca para no atar el sync de identity
# (servicio critico) a un secret placeholder; cablear cuando email pase a live.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: identity-service-secrets
  labels: { app: identity-service }
spec:
  refreshInterval: 1h
  secretStoreRef: { kind: SecretStore, name: aws-secrets-manager }
  target:
    name: identity-service-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "postgresql://{{ .db_username }}:{{ .db_password }}@{{ .db_host }}:{{ .db_port }}/{{ .db_dbname }}?schema=identity&sslmode=require"
        REDIS_URL: "rediss://:{{ .redis_auth_token }}@{{ .redis_host }}:{{ .redis_port }}"
        INTERNAL_IDENTITY_SECRET: "{{ .internal_hmac }}"
        JWT_PRIVATE_KEY_PEM: "{{ .jwt_private_pem }}"
        JWT_PUBLIC_KEY_PEM: "{{ .jwt_public_pem }}"
        DNI_HASH_SALT: "{{ .dni_hash_salt }}"
        TOTP_ENC_KEY: "{{ .totp_enc_key }}"
  data:
    - secretKey: db_username
      remoteRef: { key: veo/dev/rds/identity, property: username }
    - secretKey: db_password
      remoteRef: { key: veo/dev/rds/identity, property: password }
    - secretKey: db_host
      remoteRef: { key: veo/dev/rds/identity, property: host }
    - secretKey: db_port
      remoteRef: { key: veo/dev/rds/identity, property: port }
    - secretKey: db_dbname
      remoteRef: { key: veo/dev/rds/identity, property: dbname }
    - secretKey: redis_auth_token
      remoteRef: { key: veo/dev/redis/shared, property: auth_token }
    - secretKey: redis_host
      remoteRef: { key: veo/dev/redis/shared, property: host }
    - secretKey: redis_port
      remoteRef: { key: veo/dev/redis/shared, property: port }
    - secretKey: internal_hmac
      remoteRef: { key: veo/dev/internal/service-to-service-hmac, property: key }
    - secretKey: jwt_private_pem
      remoteRef: { key: veo/dev/auth/jwt-es256-keypair, property: private_key_pem }
    - secretKey: jwt_public_pem
      remoteRef: { key: veo/dev/auth/jwt-es256-keypair, property: public_key_pem }
    - secretKey: dni_hash_salt
      remoteRef: { key: veo/dev/identity/dni-hash-salt, property: key }
    - secretKey: totp_enc_key
      remoteRef: { key: veo/dev/identity/totp-encryption-key, property: key }
