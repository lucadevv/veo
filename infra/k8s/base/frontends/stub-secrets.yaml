# Secrets stub para frontends (Next.js): los Deployments referencian `<fe>-secrets`
# via envFrom pero no hay material secreto en AWS Secrets Manager para ellos
# (terraform les asigna rol IRSA vacio). Existen para que el pod pueda arrancar.
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-web-secrets
  labels: { app: admin-web }
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: family-web-secrets
  labels: { app: family-web }
type: Opaque
