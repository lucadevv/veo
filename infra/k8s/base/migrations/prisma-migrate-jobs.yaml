# Riel de migraciones Prisma · Jobs con hook PreSync de ArgoCD.
# Corren `prisma migrate deploy` ANTES de sincronizar los workloads (fail = no deploy).
# - Misma imagen del servicio (el transformer `images:` del overlay la reescribe igual que al Deployment).
# - DATABASE_URL viene del Secret `<svc>-secrets` materializado por External Secrets.
#   No existe MIGRATION_DATABASE_URL en el repo: las migraciones usan DATABASE_URL (verificado).
# - label tier:backend → habilita egress a RDS 5432 (networkpolicies allow-datastores-egress).
# - hook-delete-policy BeforeHookCreation: el Job anterior queda para debug hasta el proximo sync.
# GAP (lote I-A): solo payment-service y dispatch-service copian prisma/ (schema + migrations)
# al runner del Dockerfile; el resto fallara hasta que sus Dockerfiles copien prisma/.
# NOTA primer sync: el Secret lo crea ESO en fase Sync; el PRIMER sync del entorno puede fallar
# en PreSync (secret inexistente) — re-sincronizar (ver docs/runbooks/migraciones-de-db.md).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: identity-service-migrate
  labels: { app: identity-service-migrate, tier: backend }
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels: { app: identity-service-migrate, tier: backend }
    spec:
      restartPolicy: Never
      serviceAccountName: identity-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: migrate
          image: ecr/identity-service:latest
          command: ["npx", "prisma", "migrate", "deploy", "--schema=prisma/schema.prisma"]
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: identity-service-secrets, key: DATABASE_URL } }
            - { name: npm_config_cache, value: /tmp/.npm }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
