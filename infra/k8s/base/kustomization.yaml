apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app.kubernetes.io/part-of: veo

resources:
  # === Microservices ===
  - services/identity-service.yaml
  - services/trip-service.yaml
  - services/dispatch-service.yaml
  - services/tracking-service.yaml
  - services/media-service.yaml
  - services/payment-service.yaml
  - services/panic-service.yaml
  - services/notification-service.yaml
  - services/audit-service.yaml
  - services/rating-service.yaml
  - services/share-service.yaml
  - services/fleet-service.yaml
  - services/biometric-service.yaml
  - services/chat-service.yaml
  # === BFFs ===
  - bff/public-bff.yaml
  - bff/driver-bff.yaml
  - bff/admin-bff.yaml
  # === Frontends ===
  - frontends/admin-web.yaml
  - frontends/family-web.yaml
  - frontends/stub-secrets.yaml
  # === Migraciones (Jobs PreSync de ArgoCD: prisma migrate deploy) ===
  - migrations/prisma-migrate-jobs.yaml
  # === Ingress ===
  - ingress/ingress.yaml
  # === Observability (self-hosted: Prometheus, Grafana, OTel, Tempo, Loki) ===
  - observability
  # === Network policies ===
  - networkpolicies/default-deny.yaml
  - networkpolicies/east-west.yaml
