apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Stack de observabilidad self-hosted (soberano): métricas (Prometheus),
# dashboards (Grafana), trazas (OTel Collector -> Tempo) y logs (Loki + promtail).
resources:
  - prometheus.yaml
  - grafana.yaml
  - otel-collector.yaml
  - tempo.yaml
  - loki.yaml
  - networkpolicies.yaml
