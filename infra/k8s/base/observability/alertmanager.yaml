# Alertmanager self-hosted (soberano, sin SaaS). Recibe las alertas que dispara
# Prometheus (reglas en prometheus-config) y las RUTEA a un destino humano: agrupa,
# de-duplica, silencia (inhibit) y re-notifica. Sin esto, una alerta crítica como el
# SLO de PÁNICO (BR-S04, p99 < 3s) solo es visible en la UI de Prometheus y NADIE se
# entera — el diferenciador de seguridad de VEO sin page que llegue a un on-call.
#
# Degradación honesta: el TRANSPORTE de último tramo (Slack/Telegram/ntfy/PagerDuty)
# es específico del entorno y lleva un secreto, así que NO se hardcodea aquí. El
# webhook lee su URL de un archivo montado desde el Secret `alertmanager-webhook`
# (volumen `optional: true`): si el operador aún no lo configuró, Alertmanager arranca
# igual y la alerta queda visible en su UI — degrada, no crashea. El CEREBRO de ruteo
# (severidad → rama, agrupación, repeat_interval, inhibición) sí es real y canónico.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  labels: { app: alertmanager, tier: observability }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  labels: { app: alertmanager, tier: observability }
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    # Árbol de ruteo. La rama por defecto agrupa por dominio+alerta y re-notifica lento
    # (ruido bajo). La rama CRÍTICA (severity=critical, p.ej. el pánico) re-notifica
    # agresivo: un page de seguridad no espera 4 horas a repetirse.
    route:
      receiver: default
      group_by: ['domain', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # Seguridad crítica: notificar casi inmediato y re-notificar cada 15m hasta resolver.
        - matchers:
            - severity = "critical"
          receiver: urgent
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 15m

    # No spamear dos alertas por el mismo incidente: si hay un critical activo de un
    # dominio, silenciar el warning del MISMO dominio (el critical ya cuenta la historia).
    inhibit_rules:
      - source_matchers: [severity = "critical"]
        target_matchers: [severity = "warning"]
        equal: [domain]

    receivers:
      # Webhook genérico hacia el relay de on-call. La URL viene de un Secret montado
      # (url_file), NUNCA inline en este ConfigMap (regla de infra #3: secretos jamás en
      # config commiteada). send_resolved: también avisa cuando la alerta se recupera.
      - name: default
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/ops-webhook-url
            send_resolved: true
      - name: urgent
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/ops-webhook-url
            send_resolved: true
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alertmanager
  labels: { app: alertmanager, tier: observability }
spec:
  serviceName: alertmanager
  replicas: 1
  selector: { matchLabels: { app: alertmanager } }
  template:
    metadata:
      labels: { app: alertmanager, tier: observability }
      annotations:
        # Prometheus auto-scrapea sus propias métricas (notificaciones enviadas/fallidas).
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: alertmanager
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.listen-address=:9093
          ports:
            - { name: http, containerPort: 9093, protocol: TCP }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/alertmanager }
            - { name: data, mountPath: /alertmanager }
            # Secreto del webhook (URL de on-call). Opcional: si no existe, Alertmanager
            # arranca y la alerta queda en su UI (degradación honesta del último tramo).
            - { name: secrets, mountPath: /etc/alertmanager/secrets, readOnly: true }
      volumes:
        - name: config
          configMap: { name: alertmanager-config }
        - name: secrets
          secret:
            secretName: alertmanager-webhook
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: data
        labels: { app: alertmanager, tier: observability }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  labels: { app: alertmanager, tier: observability }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 9093, targetPort: http, protocol: TCP }
  selector: { app: alertmanager }
