# NetworkPolicies para la capa de observabilidad sobre el default-deny global.
# Cada flujo se permite explícitamente (regla maestra: default-deny + allowlist).
# Nota: Prometheus/promtail usan service discovery contra el kube-apiserver; el
# egress al apiserver y a los pods scrapeados se permite aquí.
---
# Prometheus: scrape saliente a cualquier pod del namespace (tier backend/observability)
# y al apiserver para SD. Ingress a su UI/API desde grafana.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus
  labels: { app: prometheus, tier: observability }
spec:
  podSelector: { matchLabels: { app: prometheus } }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: grafana } }
      ports: [{ protocol: TCP, port: 9090 }]
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    # Scrape de pods de aplicación (mismo namespace) y del otel-collector.
    - to:
        - podSelector: { matchExpressions: [{ key: tier, operator: In, values: [backend, bff, observability] }] }
    # API server (SD) — fuera del cluster pod-CIDR; se permite a todo egress restante TCP 443/6443.
    - to: []
      ports: [{ protocol: TCP, port: 443 }, { protocol: TCP, port: 6443 }]
---
# Permitir que cualquier pod backend (con prom-client) sea scrapeado por Prometheus.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-backend
  labels: { tier: observability }
spec:
  # Incluye tier:bff — los BFFs también exponen /metrics (prometheus.io/scrape).
  podSelector: { matchExpressions: [{ key: tier, operator: In, values: [backend, bff] }] }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: prometheus } }
---
# OTel Collector: ingress OTLP desde servicios backend; egress a Tempo + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector
  labels: { app: otel-collector, tier: observability }
spec:
  podSelector: { matchLabels: { app: otel-collector } }
  policyTypes: [Ingress, Egress]
  ingress:
    # OTLP desde servicios de aplicación (backend + BFFs).
    - from:
        - podSelector: { matchExpressions: [{ key: tier, operator: In, values: [backend, bff] }] }
      ports: [{ protocol: TCP, port: 4317 }, { protocol: TCP, port: 4318 }]
    # Scrape de sus métricas por Prometheus.
    - from:
        - podSelector: { matchLabels: { app: prometheus } }
      ports: [{ protocol: TCP, port: 8889 }]
  egress:
    - to:
        - namespaceSelector: {}
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to:
        - podSelector: { matchLabels: { app: tempo } }
      ports: [{ protocol: TCP, port: 4317 }]
---
# Permitir egress OTLP desde servicios backend + BFFs hacia el otel-collector.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress-otel
  labels: { tier: observability }
spec:
  podSelector: { matchExpressions: [{ key: tier, operator: In, values: [backend, bff] }] }
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector: { matchLabels: { app: otel-collector } }
      ports: [{ protocol: TCP, port: 4317 }, { protocol: TCP, port: 4318 }]
---
# Tempo: ingress OTLP desde el collector y queries desde Grafana.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tempo
  labels: { app: tempo, tier: observability }
spec:
  podSelector: { matchLabels: { app: tempo } }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: otel-collector } }
      ports: [{ protocol: TCP, port: 4317 }, { protocol: TCP, port: 4318 }]
    - from:
        - podSelector: { matchLabels: { app: grafana } }
      ports: [{ protocol: TCP, port: 3200 }]
  egress:
    - to:
        - namespaceSelector: {}
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
---
# Loki: ingress push desde promtail y queries desde Grafana.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki
  labels: { app: loki, tier: observability }
spec:
  podSelector: { matchLabels: { app: loki } }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: promtail } }
        - podSelector: { matchLabels: { app: grafana } }
      ports: [{ protocol: TCP, port: 3100 }]
  egress:
    - to:
        - namespaceSelector: {}
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
---
# Promtail: egress a Loki + apiserver (SD) + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: promtail
  labels: { app: promtail, tier: observability }
spec:
  podSelector: { matchLabels: { app: promtail } }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {}
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to:
        - podSelector: { matchLabels: { app: loki } }
      ports: [{ protocol: TCP, port: 3100 }]
    - to: []
      ports: [{ protocol: TCP, port: 443 }, { protocol: TCP, port: 6443 }]
---
# Grafana: ingress desde el ingress-controller; egress a datasources + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana
  labels: { app: grafana, tier: observability }
spec:
  podSelector: { matchLabels: { app: grafana } }
  policyTypes: [Ingress, Egress]
  ingress:
    # Permitir acceso a la UI (ajustar al namespace real del ingress-controller).
    - {}
  egress:
    - to:
        - namespaceSelector: {}
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to:
        - podSelector: { matchLabels: { app: prometheus } }
      ports: [{ protocol: TCP, port: 9090 }]
    - to:
        - podSelector: { matchLabels: { app: loki } }
      ports: [{ protocol: TCP, port: 3100 }]
    - to:
        - podSelector: { matchLabels: { app: tempo } }
      ports: [{ protocol: TCP, port: 3200 }]
