# Grafana Loki self-hosted (soberano): agregación de logs. Modo single-binary
# con filesystem local (PVC). Para escala migrar a object storage self-hosted
# (MinIO). Promtail (DaemonSet) recoge logs de los pods y los envía a Loki.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels: { app: loki, tier: observability }
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h   # 7 días
      reject_old_samples: true
      reject_old_samples_max_age: 168h
    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
    analytics:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  labels: { app: loki, tier: observability }
spec:
  serviceName: loki
  replicas: 1
  selector: { matchLabels: { app: loki } }
  template:
    metadata:
      labels: { app: loki, tier: observability }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: loki
          image: grafana/loki:3.1.1
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports:
            - { name: http, containerPort: 3100, protocol: TCP }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data, mountPath: /loki }
      volumes:
        - name: config
          configMap: { name: loki-config }
  volumeClaimTemplates:
    - metadata:
        name: data
        labels: { app: loki, tier: observability }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels: { app: loki, tier: observability }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 3100, targetPort: http, protocol: TCP }
  selector: { app: loki }
---
# ── Promtail: agente de logs por nodo ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  labels: { app: promtail, tier: observability }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: veo-promtail
  labels: { app: promtail, tier: observability }
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: veo-promtail
  labels: { app: promtail, tier: observability }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: veo-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    # namespace omitido a propósito: Kustomize lo inyecta por overlay.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  labels: { app: promtail, tier: observability }
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  labels: { app: promtail, tier: observability }
spec:
  selector: { matchLabels: { app: promtail } }
  template:
    metadata:
      labels: { app: promtail, tier: observability }
    spec:
      serviceAccountName: promtail
      securityContext:
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: promtail
          image: grafana/promtail:3.1.1
          args: ["-config.file=/etc/promtail/promtail.yaml"]
          ports:
            - { name: http, containerPort: 9080, protocol: TCP }
          env:
            - name: HOSTNAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 0 # lectura de /var/log/pods requiere root
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/promtail }
            - { name: run, mountPath: /run/promtail }
            - { name: pods, mountPath: /var/log/pods, readOnly: true }
            - { name: containers, mountPath: /var/lib/docker/containers, readOnly: true }
      volumes:
        - name: config
          configMap: { name: promtail-config }
        - name: run
          hostPath: { path: /run/promtail, type: DirectoryOrCreate }
        - name: pods
          hostPath: { path: /var/log/pods }
        - name: containers
          hostPath: { path: /var/lib/docker/containers }
