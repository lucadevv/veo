# Grafana self-hosted (soberano). Datasources provisionados: Prometheus (métricas),
# Loki (logs) y Tempo (trazas). Incluye un dashboard básico de salud de servicios VEO.
# Credenciales admin vía Secret (placeholder; en real proviene de Secrets Manager).
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  labels: { app: grafana, tier: observability }
type: Opaque
stringData:
  # PLACEHOLDER: sustituir por valores de AWS Secrets Manager (External Secrets).
  admin-user: admin
  admin-password: changeme-please
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels: { app: grafana, tier: observability }
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  labels: { app: grafana, tier: observability }
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: veo
        orgId: 1
        folder: VEO
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-veo
  labels: { app: grafana, tier: observability }
data:
  veo-services.json: |
    {
      "title": "VEO · Services Health",
      "uid": "veo-services",
      "schemaVersion": 39,
      "version": 1,
      "time": { "from": "now-6h", "to": "now" },
      "templating": { "list": [] },
      "panels": [
        {
          "type": "stat",
          "title": "Targets Up",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "count(up == 1)", "refId": "A" }]
        },
        {
          "type": "timeseries",
          "title": "HTTP request rate (per app)",
          "gridPos": { "h": 8, "w": 12, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(rate(http_requests_total[5m])) by (app)", "refId": "A" }]
        },
        {
          "type": "timeseries",
          "title": "Process CPU seconds (per app)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(rate(process_cpu_seconds_total[5m])) by (app)", "refId": "A" }]
        },
        {
          "type": "timeseries",
          "title": "Resident memory bytes (per app)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [{ "expr": "sum(process_resident_memory_bytes) by (app)", "refId": "A" }]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: { app: grafana, tier: observability }
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata:
      labels: { app: grafana, tier: observability }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - { name: http, containerPort: 3000, protocol: TCP }
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-user } }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-password } }
            - { name: GF_ANALYTICS_REPORTING_ENABLED, value: "false" }
            - { name: GF_ANALYTICS_CHECK_FOR_UPDATES, value: "false" }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboards-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
      volumes:
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashboards-provider
          configMap: { name: grafana-dashboards-provider }
        - name: dashboards
          configMap: { name: grafana-dashboard-veo }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels: { app: grafana, tier: observability }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 3000, targetPort: http, protocol: TCP }
  selector: { app: grafana }
