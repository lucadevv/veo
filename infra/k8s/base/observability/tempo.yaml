# Grafana Tempo self-hosted (soberano): backend de trazas distribuidas.
# Modo monolítico single-binary con almacenamiento local (PVC). Recibe OTLP
# desde el OpenTelemetry Collector. Para producción a gran escala migrar a
# almacenamiento en object storage (MinIO/S3 self-hosted) y modo distribuido.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  labels: { app: tempo, tier: observability }
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 168h   # 7 días
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    usage_report:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo
  labels: { app: tempo, tier: observability }
spec:
  serviceName: tempo
  replicas: 1
  selector: { matchLabels: { app: tempo } }
  template:
    metadata:
      labels: { app: tempo, tier: observability }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: tempo
          image: grafana/tempo:2.6.0
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - { name: http, containerPort: 3200, protocol: TCP }
            - { name: otlp-grpc, containerPort: 4317, protocol: TCP }
            - { name: otlp-http, containerPort: 4318, protocol: TCP }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/tempo }
            - { name: data, mountPath: /var/tempo }
      volumes:
        - name: config
          configMap: { name: tempo-config }
  volumeClaimTemplates:
    - metadata:
        name: data
        labels: { app: tempo, tier: observability }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  labels: { app: tempo, tier: observability }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 3200, targetPort: http, protocol: TCP }
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc, protocol: TCP }
    - { name: otlp-http, port: 4318, targetPort: otlp-http, protocol: TCP }
  selector: { app: tempo }
