# Prometheus self-hosted (soberano, sin SaaS). Scrapea /metrics de todos los
# servicios VEO vía pod annotations prometheus.io/* (ya expuestas por prom-client).
# StatefulSet con PVC para persistencia del TSDB.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  labels: { app: prometheus, tier: observability }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: veo-prometheus
  labels: { app: prometheus, tier: observability }
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - nonResourceURLs: ["/metrics"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: veo-prometheus
  labels: { app: prometheus, tier: observability }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: veo-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    # namespace omitido a propósito: Kustomize lo inyecta por overlay
    # (veo-dev/staging/prod). NO fijar aquí o no se reescribe por entorno.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels: { app: prometheus, tier: observability }
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: veo
    scrape_configs:
      # Auto-descubrir pods anotados con prometheus.io/scrape=true.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app
      # Self-scrape.
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      # OpenTelemetry Collector expone sus propias métricas.
      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8889"]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  labels: { app: prometheus, tier: observability }
spec:
  serviceName: prometheus
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata:
      labels: { app: prometheus, tier: observability }
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle
          ports:
            - { name: http, containerPort: 9090, protocol: TCP }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
  volumeClaimTemplates:
    - metadata:
        name: data
        labels: { app: prometheus, tier: observability }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: { app: prometheus, tier: observability }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 9090, targetPort: http, protocol: TCP }
  selector: { app: prometheus }
