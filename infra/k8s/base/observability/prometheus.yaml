# Prometheus self-hosted (soberano, sin SaaS). Scrapea /metrics de todos los
# servicios VEO vía pod annotations prometheus.io/* (ya expuestas por prom-client).
# StatefulSet con PVC para persistencia del TSDB.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  labels: { app: prometheus, tier: observability }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: veo-prometheus
  labels: { app: prometheus, tier: observability }
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - nonResourceURLs: ["/metrics"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: veo-prometheus
  labels: { app: prometheus, tier: observability }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: veo-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    # namespace omitido a propósito: Kustomize lo inyecta por overlay
    # (veo-dev/staging/prod). NO fijar aquí o no se reescribe por entorno.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels: { app: prometheus, tier: observability }
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: veo
    # Reglas de SLO/alertas. Viven en el MISMO ConfigMap (montado en /etc/prometheus), no requieren
    # prometheus-operator (este Prometheus es un StatefulSet vanilla que lee su config de aquí).
    rule_files:
      - /etc/prometheus/panic-slo.rules.yml
    scrape_configs:
      # Auto-descubrir pods anotados con prometheus.io/scrape=true.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app
      # Self-scrape.
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      # OpenTelemetry Collector expone sus propias métricas.
      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8889"]
  # ── SLO del PÁNICO (BR-S04, no-negociable VEO: p99 < 3s) ──────────────────────────────────────
  # Recording del p99 del ack 202 de POST /panic + dos alertas: warning al SLO de servicio (<800ms)
  # y critical al límite duro de seguridad (<3s). El histograma lo expone panic-service en /metrics
  # (veo_panic_trigger_ack_duration_seconds). Sin Alertmanager las alertas son visibles en la UI de
  # Prometheus (/alerts); el routing a un destino (Alertmanager) es un lote de infra aparte.
  panic-slo.rules.yml: |
    groups:
      - name: panic-slo
        rules:
          # p99 fleet-wide del ack de pánico en ventana de 5m (agrega todas las réplicas por le).
          - record: panic:ack_duration_seconds:p99_5m
            expr: histogram_quantile(0.99, sum(rate(veo_panic_trigger_ack_duration_seconds_bucket[5m])) by (le))
          # SLO de servicio: el ack del trigger debería responder <800ms p99 (BR-S04).
          - alert: PanicAckSLOWarning
            expr: panic:ack_duration_seconds:p99_5m > 0.8
            for: 5m
            labels:
              severity: warning
              domain: panic
            annotations:
              summary: "p99 del ack de pánico > 800ms (SLO BR-S04)"
              description: "p99 del ack 202 de POST /panic = {{ $value | humanizeDuration }} en 5m (SLO < 800ms). El botón de pánico es el diferenciador de seguridad de VEO."
          # Límite DURO no-negociable: el pánico debe acusar recibo en < 3s SIEMPRE.
          - alert: PanicAckSLOCritical
            expr: panic:ack_duration_seconds:p99_5m > 3
            for: 1m
            labels:
              severity: critical
              domain: panic
            annotations:
              summary: "p99 del ack de pánico > 3s (límite duro VEO)"
              description: "p99 del ack de pánico = {{ $value | humanizeDuration }}, supera el límite no-negociable de 3s. Flujo de seguridad degradado."
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  labels: { app: prometheus, tier: observability }
spec:
  serviceName: prometheus
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata:
      labels: { app: prometheus, tier: observability }
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle
          ports:
            - { name: http, containerPort: 9090, protocol: TCP }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
  volumeClaimTemplates:
    - metadata:
        name: data
        labels: { app: prometheus, tier: observability }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: { app: prometheus, tier: observability }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 9090, targetPort: http, protocol: TCP }
  selector: { app: prometheus }
