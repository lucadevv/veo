# OpenTelemetry Collector self-hosted (soberano). Recibe OTLP (gRPC/HTTP) desde
# los servicios VEO que ya tienen OTel bootstrap y exporta trazas a Tempo y
# métricas (vía prometheus exporter) que Prometheus scrapea en :8889.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  labels: { app: otel-collector, tier: observability }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels: { app: otel-collector, tier: observability }
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
    exporters:
      # Trazas -> Tempo (OTLP gRPC).
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      # Métricas derivadas -> endpoint Prometheus para scrape.
      prometheus:
        endpoint: 0.0.0.0:8889
      debug:
        verbosity: basic
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions: [health_check]
      telemetry:
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels: { app: otel-collector, tier: observability }
spec:
  replicas: 2
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata:
      labels: { app: otel-collector, tier: observability }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8889"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: otel-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.109.0
          args: ["--config=/etc/otel/collector.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317, protocol: TCP }
            - { name: otlp-http, containerPort: 4318, protocol: TCP }
            - { name: prom, containerPort: 8889, protocol: TCP }
            - { name: metrics, containerPort: 8888, protocol: TCP }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /, port: 13133 }
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/otel }
      volumes:
        - name: config
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels: { app: otel-collector, tier: observability }
spec:
  type: ClusterIP
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc, protocol: TCP }
    - { name: otlp-http, port: 4318, targetPort: otlp-http, protocol: TCP }
    - { name: prom, port: 8889, targetPort: prom, protocol: TCP }
  selector: { app: otel-collector }
