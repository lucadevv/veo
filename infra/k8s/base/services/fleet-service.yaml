## Template para Deployment + Service de un microservicio VEO.
## Copiar a services/<svc-name>.yaml y sustituir fleet-service y 3012.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-service
  labels: { app: fleet-service, tier: backend }
spec:
  replicas: 2
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector: { matchLabels: { app: fleet-service } }
  template:
    metadata:
      labels: { app: fleet-service, tier: backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3012"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fleet-service # IRSA bound to least-privilege IAM role
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: fleet-service } }
      containers:
        - name: app
          image: ecr/fleet-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3012, protocol: TCP }
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "3012" }
          envFrom:
            - secretRef: { name: fleet-service-secrets }
            - configMapRef: { name: fleet-service-config }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector: { matchLabels: { app: fleet-service } }
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-service
  labels: { app: fleet-service }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
  selector: { app: fleet-service }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fleet-service-pdb
spec:
  minAvailable: 1
  selector: { matchLabels: { app: fleet-service } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fleet-service-hpa
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: fleet-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
