## Template para Deployment + Service de un microservicio VEO.
## places-service: NestJS, HTTP 3013 + gRPC 50063 (geocoding/places). Consumido por
## otros services vía PLACES_GRPC_URL (places-service:50063, ver overlays/*/configmaps.yaml).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: places-service
  labels: { app: places-service, tier: backend }
spec:
  replicas: 2
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector: { matchLabels: { app: places-service } }
  template:
    metadata:
      labels: { app: places-service, tier: backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3013"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: places-service # IRSA bound to least-privilege IAM role
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: places-service } }
      containers:
        - name: app
          image: ecr/places-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3013, protocol: TCP }
            - { name: grpc, containerPort: 50063, protocol: TCP }
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "3013" }
            - { name: GRPC_PORT, value: "50063" }
          envFrom:
            - secretRef: { name: places-service-secrets }
            - configMapRef: { name: places-service-config }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector: { matchLabels: { app: places-service } }
---
apiVersion: v1
kind: Service
metadata:
  name: places-service
  labels: { app: places-service }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
    - { name: grpc, port: 50063, targetPort: grpc, protocol: TCP }
  selector: { app: places-service }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: places-service-pdb
spec:
  minAvailable: 1
  selector: { matchLabels: { app: places-service } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: places-service-hpa
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: places-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
