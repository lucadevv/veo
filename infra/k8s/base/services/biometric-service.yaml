## Template para Deployment + Service de un microservicio VEO.
## biometric-service: Python/FastAPI + ONNX, puerto 3015, schema biométrico.
## Difiere del template estándar: más CPU/mem por inferencia ONNX (CPU, sin GPU
## obligatorio), env de Python en vez de NODE_ENV, y emptyDir /tmp escribible
## porque ONNX Runtime necesita escratch temporal con readOnlyRootFilesystem.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biometric-service
  labels: { app: biometric-service, tier: backend }
spec:
  replicas: 2
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector: { matchLabels: { app: biometric-service } }
  template:
    metadata:
      labels: { app: biometric-service, tier: backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3015"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: biometric-service # IRSA bound to least-privilege IAM role
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: biometric-service } }
      containers:
        - name: app
          image: ecr/biometric-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3015, protocol: TCP }
          env:
            - { name: APP_ENV, value: production }
            - { name: VEO_BIO_PORT, value: "3015" }
            - { name: PYTHONUNBUFFERED, value: "1" }
            # Limitar hilos de ONNX/OpenMP a los cores asignados al pod.
            - { name: OMP_NUM_THREADS, value: "2" }
            - { name: ONNXRUNTIME_NUM_THREADS, value: "2" }
            - { name: TMPDIR, value: /tmp }
          envFrom:
            - secretRef: { name: biometric-service-secrets }
            - configMapRef: { name: biometric-service-config }
          resources:
            # Inferencia ONNX en CPU: más recursos que un servicio NestJS estándar.
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2000m", memory: "4Gi" }
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /health, port: http }
            # ONNX puede tardar en cargar el modelo: ventana de arranque más amplia.
            failureThreshold: 60
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 512Mi }
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector: { matchLabels: { app: biometric-service } }
---
apiVersion: v1
kind: Service
metadata:
  name: biometric-service
  labels: { app: biometric-service }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
  selector: { app: biometric-service }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: biometric-service-pdb
spec:
  minAvailable: 1
  selector: { matchLabels: { app: biometric-service } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: biometric-service-hpa
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: biometric-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      # Escalar antes (60%) porque la inferencia ONNX satura CPU rápido.
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
