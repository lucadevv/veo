# External Secrets Operator · instalado como Application de ArgoCD via helm chart oficial.
# Decision: el repo no vendoriza CRDs de operadores; ArgoCD soporta sources helm nativamente
# y el README de infra ya lista External Secrets como componente core del bootstrap (paso 3).
# Una instalacion por cluster (cluster-scoped); aplicar junto con veo-<env>.yaml en el bootstrap.
# Los SecretStore/ExternalSecret que CONSUMEN el operador viven en k8s/overlays/<env>/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: veo
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.5 # pin explicito; subir de version via PR
    helm:
      valuesObject:
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
