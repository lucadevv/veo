apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: veo-prod
  namespace: argocd
spec:
  project: veo
  source:
    repoURL: git@github.com:lucadevv/veo.git
    targetRevision: main
    path: infra/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: veo-prod
  syncPolicy:
    automated: { prune: false, selfHeal: false }  # prod: manual approval
    syncOptions: [CreateNamespace=true]
