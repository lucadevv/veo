apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: veo-staging, namespace: argocd }
spec:
  project: veo
  source:
    repoURL: git@github.com:veo/veo-deploy.git
    targetRevision: main
    path: infra/k8s/overlays/staging
  destination: { server: https://kubernetes.default.svc, namespace: veo-staging }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
