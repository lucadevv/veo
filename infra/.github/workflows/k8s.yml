name: K8s & Workflows

on:
  pull_request:
    paths:
      - "k8s/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kustomize:
    name: Kustomize build & validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: "0.6.7"

      - name: Build overlay with kustomize
        run: |
          kubectl kustomize "k8s/overlays/${{ matrix.env }}" > "rendered-${{ matrix.env }}.yaml"
          echo "Rendered $(grep -c '^kind:' "rendered-${{ matrix.env }}.yaml") top-level resources."

      - name: Validate manifests with kubeconform
        # -strict catches unknown fields; CRDs (ArgoCD, cert-manager, etc.) are
        # not in the default schema set, so we skip-kinds for the common ones and
        # allow missing schemas to avoid false negatives on custom resources.
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -skip "Application,AppProject,Certificate,Issuer,ClusterIssuer" \
            -kubernetes-version 1.30.0 \
            "rendered-${{ matrix.env }}.yaml"

  workflow-lint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
