name: Terraform

on:
  pull_request:
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/veo-${{ matrix.env }}-tf-plan
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.0 }
      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Terraform validate
        run: terraform -chdir=terraform/envs/${{ matrix.env }} init -backend=false && terraform -chdir=terraform/envs/${{ matrix.env }} validate
      - name: Terraform plan
        if: github.event_name == 'pull_request'
        run: terraform -chdir=terraform/envs/${{ matrix.env }} init && terraform -chdir=terraform/envs/${{ matrix.env }} plan
