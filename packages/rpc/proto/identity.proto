syntax = "proto3";

package veo.identity.v1;

// Contrato gRPC que identity-service expone a otros servicios (trip, dispatch, panic, etc.).
// mTLS en producción (FOUNDATION §10). Kafka cubre lo asíncrono; gRPC lo síncrono de lectura.
service IdentityService {
  rpc GetUser (GetByIdRequest) returns (UserReply);
  rpc GetDriver (GetByIdRequest) returns (DriverReply);
  rpc GetDriverByUser (GetByIdRequest) returns (DriverReply);
}

message GetByIdRequest {
  string id = 1;
}

message UserReply {
  string id = 1;
  string phone = 2;
  string type = 3;
  string kyc_status = 4;
  bool deleted = 5;
  bool found = 6;
  // Nombre visible del usuario. Opcional ("" si no fue registrado). Añadido sin romper compatibilidad.
  string name = 7;
}

message DriverReply {
  string id = 1;
  string user_id = 2;
  string current_status = 3;
  string background_check_status = 4;
  double average_rating = 5;
  bool found = 6;
  // ISO-8601 del momento de suspensión del conductor; "" si NO está suspendido. Añadido sin romper
  // compatibilidad (campo 7). Lo consume dispatch para el gate de elegibilidad de la PUJA (ADR 010 §6,
  // cierre estructural del catastrófico #9): un conductor suspendido no puede ofertar.
  string suspended_at = 7;
  // BE-1b · nombre visible del conductor (de User.name vía la relación driver→user). "" si no registrado.
  // Lo consume el public-bff para enriquecer la card de la oferta de la puja con el nombre del conductor.
  string name = 8;
  // Motivo del último rechazo de antecedentes del conductor; "" si NO está rechazado o no se dio motivo.
  // Añadido sin romper compatibilidad (campo 9). Lo consume el driver-bff (GET /drivers/me) para que la
  // app del conductor muestre el motivo en la pantalla de RECHAZO y ofrezca corregir-y-reenviar.
  string rejection_reason = 9;
  // ── Campos de REVISIÓN del operador (admin-bff GET /ops/drivers/:id). Añadidos sin romper
  // compatibilidad (campos 10-15). Todos opcionales: "" / proto3-default cuando no hay dato. ──
  // Licencia/DNI del conductor (IDENTIDAD personal · Compliance+); "" si no registrada.
  string license_number = 10;
  // Estado KYC del usuario asociado (driver→user). "" si no se incluyó / no registrado.
  string kyc_status = 11;
  // ISO-8601 de alta del conductor; "" si no disponible.
  string created_at = 12;
  // ISO-8601 del enrolamiento biométrico facial; "" si aún no enroló.
  string face_enrolled_at = 13;
  // ISO-8601 de la última verificación biométrica en vivo; "" si nunca verificó.
  string last_verified_at = 14;
  // Teléfono del usuario asociado (driver→user); "" si no registrado.
  string phone = 15;
}
