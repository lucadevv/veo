syntax = "proto3";

package veo.identity.v1;

// Contrato gRPC que identity-service expone a otros servicios (trip, dispatch, panic, etc.).
// mTLS en producción (FOUNDATION §10). Kafka cubre lo asíncrono; gRPC lo síncrono de lectura.
service IdentityService {
  rpc GetUser (GetByIdRequest) returns (UserReply);
  rpc GetDriver (GetByIdRequest) returns (DriverReply);
  rpc GetDriverByUser (GetByIdRequest) returns (DriverReply);
  // Lectura BATCH para enriquecer listados del admin (nombre/teléfono por página, sin N+1). El admin-bff
  // la llama UNA vez por página con los driverId visibles; devuelve los DriverReply hallados (orden libre).
  rpc GetDriversByIds (DriverIdsRequest) returns (DriversByIdsReply);
}

message GetByIdRequest {
  string id = 1;
}

message DriverIdsRequest {
  repeated string ids = 1;
}

message DriversByIdsReply {
  repeated DriverReply drivers = 1;
}

message UserReply {
  string id = 1;
  string phone = 2;
  string type = 3;
  string kyc_status = 4;
  bool deleted = 5;
  bool found = 6;
  // Nombre visible del usuario. Opcional ("" si no fue registrado). Añadido sin romper compatibilidad.
  string name = 7;
}

message DriverReply {
  string id = 1;
  string user_id = 2;
  string current_status = 3;
  string background_check_status = 4;
  double average_rating = 5;
  bool found = 6;
  // ISO-8601 del momento de suspensión del conductor; "" si NO está suspendido. Añadido sin romper
  // compatibilidad (campo 7). Lo consume dispatch para el gate de elegibilidad de la PUJA (ADR 010 §6,
  // cierre estructural del catastrófico #9): un conductor suspendido no puede ofertar.
  string suspended_at = 7;
  // BE-1b · nombre visible del conductor (de User.name vía la relación driver→user). "" si no registrado.
  // Lo consume el public-bff para enriquecer la card de la oferta de la puja con el nombre del conductor.
  string name = 8;
  // Motivo del último rechazo de antecedentes del conductor; "" si NO está rechazado o no se dio motivo.
  // Añadido sin romper compatibilidad (campo 9). Lo consume el driver-bff (GET /drivers/me) para que la
  // app del conductor muestre el motivo en la pantalla de RECHAZO y ofrezca corregir-y-reenviar.
  string rejection_reason = 9;
  // ── Campos de REVISIÓN del operador (admin-bff GET /ops/drivers/:id). Añadidos sin romper
  // compatibilidad (campos 10-15). Todos opcionales: "" / proto3-default cuando no hay dato. ──
  // Licencia/DNI del conductor (IDENTIDAD personal · Compliance+); "" si no registrada.
  string license_number = 10;
  // Estado KYC del usuario asociado (driver→user). "" si no se incluyó / no registrado.
  string kyc_status = 11;
  // ISO-8601 de alta del conductor; "" si no disponible.
  string created_at = 12;
  // ISO-8601 del enrolamiento biométrico facial; "" si aún no enroló.
  string face_enrolled_at = 13;
  // ISO-8601 de la última verificación biométrica en vivo; "" si nunca verificó.
  string last_verified_at = 14;
  // Teléfono del usuario asociado (driver→user); "" si no registrado.
  string phone = 15;
  // DNI del conductor (documento de identidad · Compliance+); "" si no registrado. Backward-compatible.
  string document_id = 16;
  // Fecha de nacimiento del conductor en yyyy-mm-dd; "" si no registrada. Backward-compatible.
  string birth_date = 17;
  // ── Sub-lote 3C · BINDING DNI↔selfie (admin-bff GET /ops/drivers/:id). Resultado GUARDADO del face-match
  // entre la foto FRONT del DNI y la biometría de referencia del conductor. El operador lo VE antes de
  // aprobar. Campos 18-20. Backward-compatible (proto3 defaults: "" / 0 / false cuando no se corrió). ──
  // Estado del binding tipado: NOT_RUN (aún no se corrió), MATCHED (coincide), NO_MATCH (no coincide). Evita
  // ambigüedad del bool proto3 (false = no coincide vs no corrido): usamos un string de estado explícito.
  string dni_face_match_status = 18;
  // Score del face-match en 0..100; 0 si no se corrió. Solo significativo si dni_face_match_status != NOT_RUN.
  double dni_face_match_score = 19;
  // ISO-8601 de cuándo se corrió el face-match; "" si no se corrió.
  string dni_face_matched_at = 20;
  // CAUSAS ACTIVAS de la suspensión (modelo de HOLDS): el conjunto de `cause` DISTINTAS de los holds vigentes
  // del conductor (DISCIPLINARY / DOCUMENT_EXPIRED / INSPECTION_EXPIRED). Vacío si NO está suspendido. Campo
  // 21, backward-compatible. Lo consume el admin-bff (GET /ops/drivers/:id) para que el panel sepa POR QUÉ
  // está suspendido y llame el endpoint correcto de reactivación: DISCIPLINARY → /reactivate;
  // DOCUMENT_EXPIRED/INSPECTION_EXPIRED → /reactivate-compliance. NO es PII. `suspended_at` (campo 7) sigue
  // siendo el flag derivado de "está suspendido"; esto añade el PORQUÉ. Un conductor puede tener VARIAS causas.
  repeated string suspension_causes = 21;
  // ── Lote C · BINDING licencia↔selfie (gemelo del DNI, binding MÁS FUERTE). Resultado GUARDADO del face-match
  // entre la foto del brevete (LICENSE_A1) y la biometría de referencia. El operador lo VE antes de aprobar;
  // approve() exige AMBOS bindings ejecutados. Campos 22-24, backward-compatible (proto3 defaults). ──
  string license_face_match_status = 22;
  // Score del face-match del brevete en 0..100; 0 si no se corrió. El brevete es low-res → score típicamente
  // más bajo que el DNI; el veredicto lo decide el operador. Solo significativo si status != NOT_RUN.
  double license_face_match_score = 23;
  // ISO-8601 de cuándo se corrió el face-match del brevete; "" si no se corrió.
  string license_face_matched_at = 24;
}
