syntax = "proto3";

package veo.panic.v1;

// Contrato gRPC que panic-service expone a otros servicios (dispatch, audit, BFF admin).
// mTLS en producción (FOUNDATION §10). Kafka cubre lo asíncrono; gRPC lo síncrono de lectura.
service PanicService {
  rpc GetPanic (GetPanicRequest) returns (PanicReply);
}

message GetPanicRequest {
  string id = 1;
}

message PanicReply {
  string id = 1;
  string trip_id = 2;
  string passenger_id = 3;
  string status = 4;
  double geo_lat = 5;
  double geo_lon = 6;
  string triggered_at = 7;
  string acknowledged_at = 8;
  string ack_by = 9;
  bool found = 10;
}
