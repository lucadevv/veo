syntax = "proto3";

package veo.share.v1;

// Contrato gRPC que share-service expone a otros servicios (notification, panic).
// mTLS en producción (FOUNDATION §10). Kafka cubre lo asíncrono; gRPC lo síncrono de lectura.
service ShareService {
  // Contactos de confianza verificados de un usuario (para notificar en pánico).
  rpc GetTrustedContacts (GetTrustedContactsRequest) returns (TrustedContactsReply);
}

message GetTrustedContactsRequest {
  string user_id = 1;
  // Incluir contactos PENDIENTES de OTP (vista del DUEÑO en su pantalla de contactos: necesita
  // verlos para reenviar/verificar). El fan-out de pánico OMITE el campo (false) → solo verificados,
  // semántica original intacta (backward-compatible).
  bool include_unverified = 2;
}

message TrustedContact {
  string id = 1;
  string user_id = 2;
  string phone = 3;
  string name = 4;
  string relationship = 5;
  bool otp_verified = 6;
}

message TrustedContactsReply {
  repeated TrustedContact contacts = 1;
}
