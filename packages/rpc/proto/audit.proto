syntax = "proto3";

package veo.audit.v1;

// Contrato gRPC que audit-service expone a otros servicios (registro/verificación síncrona).
// mTLS en producción (FOUNDATION §10). Kafka cubre lo asíncrono; gRPC lo síncrono.
service AuditService {
  rpc Record (RecordRequest) returns (RecordReply);
  rpc Verify (VerifyRequest) returns (VerifyReply);
}

message RecordRequest {
  string actor_id = 1;
  string action = 2;
  string resource_type = 3;
  string resource_id = 4;
  // Payload del detalle, serializado como JSON.
  string payload_json = 5;
}

message RecordReply {
  string id = 1;
  string seq = 2;
  string hash = 3;
}

message VerifyRequest {
  // seq inicial/final del rango (string para soportar bigint). Vacío = sin límite.
  string from_seq = 1;
  string to_seq = 2;
}

message VerifyReply {
  bool valid = 1;
  uint32 checked = 2;
  string broken_at_seq = 3;
  string reason = 4;
}
